      <label class="lbl">חיפוש חכם — שם מקום, אתר או כתובת מלאה</label>
      <div class="suggest-box">
        <input class="field" id="pin-search" placeholder="לדוגמה: Cascata delle Marmore, או כתובת מלאה…" autocomplete="off">
        <div class="suggest-list" id="pin-suggest"></div>
      </div>
      <p class="muted" style="margin:8px 0">בחרו הצעה מהרשימה, הקלידו כתובת ולחצו Enter, או בחרו נקודה ידנית על המפה.</p>
      <button id="map-place-btn" class="pin-mode-btn" onclick="enterPinPlacementMode()">📍 בחירת נקודה על המפה</button>
      <div id="map-place-hint" style="display:none;background:var(--brand);color:#fff;text-align:center;padding:10px 14px;border-radius:10px;margin-bottom:10px;font-size:13px;font-weight:600">לחצו על המפה לסימון המיקום הרצוי 🖱️</div>
      <div id="map-pin-form" style="display:none;border-top:1px solid var(--border-soft);padding-top:12px">
        <div style="font-weight:700;font-size:13.5px;color:var(--brand);margin-bottom:10px" id="map-form-title">📍 מיקום חדש</div>
        <div id="pin-coords-hint" style="display:none;font-size:11.5px;color:var(--green);font-weight:600;margin-bottom:8px;background:color-mix(in srgb,var(--green) 12%,transparent);padding:6px 10px;border-radius:8px"></div>
        <div class="row"><input type="text" id="pin-name" placeholder="שם המיקום *"></div>
        <div class="row">
          <select id="pin-type"><option value="attraction">🏛️ אטרקציה</option><option value="kosher">🍽️ מסעדה / מקום כשר</option><option value="other">📌 אחר</option></select>
          <select id="pin-adder"><option value="">מי מוסיף?</option>${FAMILIES.map(f=>`<option>${escapeHtml(f)}</option>`).join('')}</select>
        </div>
        <div class="row"><input type="text" id="pin-note" placeholder="הערה (שעות, מחיר, טיפ...)"></div>
        <div style="display:flex;gap:8px;margin-top:4px">
          <button class="btn btn-add" style="flex:1" onclick="saveMapPin()">שמירה</button>
          <button class="btn btn-ghost" style="flex:1" onclick="cancelMapPin()">ביטול</button>
        </div>
      </div>
    </div>

    <div class="section-title" style="margin-top:14px">📌 המיקומים שלנו</div>
    <div id="map-user-pins-list"></div>
  `;

  const map = L.map('trip-map',{zoomControl:true}).setView(VILLA_COORDS, 9);
  cache.leafletMap = map;
  cache.setMapTiles = function(theme){
    if(cache.tileLayer){ cache.tileLayer.remove(); }
    cache.tileLayer = L.tileLayer(theme==='dark'?DARK_TILES:LIGHT_TILES, {attribution:TILE_ATTR, maxZoom:19, subdomains:'abcd'}).addTo(map);
  };
  cache.setMapTiles(document.documentElement.getAttribute('data-theme')==='dark'?'dark':'light');

  // layer groups per category
  cache.mapLayers = { villa:makeGroup(), itinerary:makeGroup(), attractions:makeGroup(), kosher:makeGroup(), custom:makeGroup() };

  map.on('click', function(e){
    if(!cache.mapAddMode) return;
    if(cache.tempPinMarker){ cache.tempPinMarker.remove(); }
    cache.tempPinMarker = L.marker([e.latlng.lat,e.latlng.lng],{icon:mapPin('#555','📍')}).addTo(map);
    const hint=el('map-place-hint'); if(hint) hint.style.display='none';
    openMapPinForm(e.latlng.lat, e.latlng.lng, null);
  });

  // Villa
  cache.mapLayers.villa.addLayer(
    L.marker(VILLA_COORDS, {icon: mapPin('#F2A93B','🏡'), zIndexOffset:1000})
     .bindPopup(`<div dir="rtl"><b>🏡 הווילה שלנו</b><br>Villa La Corona, אוטריקולי<br><small style="color:var(--text-mute)">Strada Vallefigliola, Otricoli</small>${navPopupBtn(VILLA_COORDS[0],VILLA_COORDS[1],'Villa La Corona')}</div>`));

  // Hardcoded attractions
  HARDCODED_ATTRACTIONS.forEach(a=>{
    cache.mapLayers.attractions.addLayer(
      L.marker(jitter(a.coords), {icon: mapPin('#D9654B','🏛️')})
       .bindPopup(`<div dir="rtl"><b>🏛️ ${escapeHtml(a.name)}</b><br><small style="color:var(--text-mute)">${escapeHtml(a.desc)}</small><br><small style="color:var(--text-mute)">${fmtDistFromVilla(a.coords[0],a.coords[1])}</small>${navPopupBtn(a.coords[0],a.coords[1],a.name)}</div>`));
  });

  // Itinerary day pins
  itinerary.forEach(day=>{
    if(!day.city) return;
    const coords=lookupCityCoords(day.city); if(!coords) return;
    const activities=[day.morning,day.noon,day.evening].filter(Boolean).join(' · ');
    const inner=`<span style="font-family:'Frank Ruhl Libre',serif;font-weight:700;color:#fff;font-size:12px">${day.num}</span>`;
    cache.mapLayers.itinerary.addLayer(
      L.marker(jitter(coords), {icon: mapPin('#15607F',inner)})
       .bindPopup(`<div dir="rtl"><b>יום ${day.num} — ${escapeHtml(day.city)}</b>${activities?`<br><small style="color:var(--text-mute)">${escapeHtml(activities)}</small>`:''}${navPopupBtn(coords[0],coords[1],day.city)}</div>`));
  });

  // Kosher spots
  kosherSpots.forEach(spot=>{
    const coords=lookupCityCoords(spot.city); if(!coords) return;
    cache.mapLayers.kosher.addLayer(
      L.marker(jitter(coords), {icon: mapPin('#3D9B6C','🍽️')})
       .bindPopup(`<div dir="rtl"><b>🍽️ ${escapeHtml(spot.name)}</b><br>${escapeHtml(spot.city)}${spot.note?`<br><small style="color:var(--text-mute)">${escapeHtml(spot.note)}</small>`:''}${navPopupBtn(coords[0],coords[1],spot.name)}</div>`));
  });

  // Custom villa attractions
  customAttractions.forEach(a=>{
    const coords=lookupCityCoords(a.name)||lookupCityCoords(a.dist||''); if(!coords) return;
    cache.mapLayers.attractions.addLayer(
      L.marker(jitter(coords), {icon: mapPin('#D9654B','⭐')})
       .bindPopup(`<div dir="rtl"><b>⭐ ${escapeHtml(a.name)}</b>${a.desc?`<br><small style="color:var(--text-mute)">${escapeHtml(a.desc)}</small>`:''}${navPopupBtn(coords[0],coords[1],a.name)}</div>`));
  });

  // add all groups to map (filters default on)
  Object.values(cache.mapLayers).forEach(g=>g.addTo(map));

  refreshUserPins(userPins);
  renderMapFilters();

  // smart search wiring
  const ps=el('pin-search');
  if(ps){
    ps.addEventListener('input', debounce(e=>geocodeSuggest(e.target.value), 350));
    ps.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); geocodeAndPlace(); } });
  }
  document.addEventListener('click', e=>{ const sb=el('pin-suggest'); if(sb && !e.target.closest('.suggest-box')) sb.classList.remove('show'); });
};

function renderMapFilters(){
  const f=cache.mapFilters||{}; const elm=el('map-filters'); if(!elm) return;
  elm.innerHTML = MAP_CATS.map(c=>`<button class="map-filter${f[c.key]?'':' off'}" onclick="toggleMapFilter('${c.key}')" aria-pressed="${!!f[c.key]}"><span class="map-dot" style="background:${c.color}"></span>${c.label}</button>`).join('');
}
function toggleMapFilter(key){
  const f=cache.mapFilters; f[key]=!f[key];
  const grp=cache.mapLayers[key];
  if(grp && cache.leafletMap){ if(f[key]) grp.addTo(cache.leafletMap); else cache.leafletMap.removeLayer(grp); }
  renderMapFilters();
}

/* ----- smart geocoding (Nominatim) ----- */
async function geocodeSuggest(qstr){
  const list=el('pin-suggest'); if(!list) return;
  if(!qstr || qstr.trim().length<3){ list.classList.remove('show'); list.innerHTML=''; return; }
  list.classList.add('show'); list.innerHTML='<div class="suggest-loading">מחפש…</div>';
  try{
    const url=`${NOMINATIM}?format=jsonv2&q=${encodeURIComponent(qstr)}&accept-language=he&limit=6&countrycodes=it&addressdetails=1`;
    const res=await fetch(url,{headers:{'Accept':'application/json'}});
    const data=await res.json();
    if(!data.length){ list.innerHTML='<div class="suggest-loading">לא נמצאו תוצאות — אפשר לבחור נקודה ידנית על המפה</div>'; return; }
    list.innerHTML=data.map(d=>{
      const name=d.name||d.display_name.split(',')[0];
      return `<div class="suggest-item" onclick="choosePinSuggestion('${d.lat}','${d.lon}','${q(d.display_name)}')"><span class="si-ic">📍</span><span style="min-width:0"><div class="si-main">${escapeHtml(name)}</div><div class="si-sub">${escapeHtml(d.display_name)}</div></span></div>`;
    }).join('');
  }catch(e){ list.innerHTML='<div class="suggest-loading">שגיאת חיפוש — בדקו חיבור לאינטרנט</div>'; }
}
async function geocodeAndPlace(){
  const v=(el('pin-search').value||'').trim(); if(v.length<3) return;
  try{
    const res=await fetch(`${NOMINATIM}?format=jsonv2&q=${encodeURIComponent(v)}&accept-language=he&limit=1&countrycodes=it`,{headers:{'Accept':'application/json'}});
    const data=await res.json();
    if(data.length) choosePinSuggestion(data[0].lat, data[0].lon, data[0].display_name);
    else alertModal('לא נמצאה כתובת מתאימה — נסו ניסוח אחר או בחרו נקודה על המפה','🔍');
  }catch(e){ alertModal('שגיאת חיפוש — בדקו חיבור לאינטרנט','⚠️'); }
}
function choosePinSuggestion(lat,lng,displayName){
  lat=parseFloat(lat); lng=parseFloat(lng);
  const sb=el('pin-suggest'); if(sb) sb.classList.remove('show');
  const shortName=(displayName||'').split(',')[0];
  if(cache.tempPinMarker) cache.tempPinMarker.remove();
  cache.tempPinMarker=L.marker([lat,lng],{icon:mapPin('#555','📍')}).addTo(cache.leafletMap);
  cache.leafletMap.setView([lat,lng],14);
  cache.mapAddMode=true;
  openMapPinForm(lat,lng,null);
  el('pin-name').value=shortName;
}

/* ----- user pin CRUD ----- */
function refreshUserPins(pins){
  const grp=cache.mapLayers && cache.mapLayers.custom; if(!grp) return;
  grp.clearLayers();
  pins.forEach(pin=>{
    const ic=MAP_PIN_ICONS[pin.type]||'📌', col=MAP_PIN_COLORS[pin.type]||'#7a7a7a';
    const popup=`<div dir="rtl" style="min-width:170px"><b>${ic} ${escapeHtml(pin.name)}</b>${pin.note?`<br><small style="color:var(--text-mute)">${escapeHtml(pin.note)}</small>`:''}<br><small style="color:var(--text-mute)">${fmtDistFromVilla(pin.lat,pin.lng)}</small>${navPopupBtn(pin.lat,pin.lng,pin.name)}<div class="lp-actions"><button class="lp-edit" onclick="editMapPinForm('${pin.id}')">✏️ ערוך</button><button class="lp-del" onclick="deleteMapPin('${pin.id}')">🗑️ מחק</button></div></div>`;
    grp.addLayer(L.marker([pin.lat,pin.lng],{icon:mapPin(col,ic)}).bindPopup(popup));
  });
  renderUserPinList(pins);
}
function renderUserPinList(pins){
  const elm=el('map-user-pins-list'); if(!elm) return;
  elm.innerHTML=pins.length ? pins.map(pin=>`
    <div class="map-user-pin-card">
      <span style="font-size:22px">${MAP_PIN_ICONS[pin.type]||'📌'}</span>
      <div class="pin-info"><div class="pin-name">${escapeHtml(pin.name)}</div><div class="pin-meta">${[pin.note?escapeHtml(pin.note):'',fmtDistFromVilla(pin.lat,pin.lng)].filter(Boolean).join(' · ')}</div></div>
      <div class="pin-actions">
        <button class="btn-icon" title="ניווט" aria-label="ניווט" onclick="navTo(${pin.lat},${pin.lng},'${q(pin.name)}')">🧭</button>
        <button class="btn-icon" title="עריכה" aria-label="עריכה" onclick="editMapPinForm('${pin.id}')">✏️</button>
        <button class="btn-del" aria-label="מחיקה" onclick="deleteMapPin('${pin.id}')">🗑️</button>
      </div>
    </div>`).join('') : '<div class="card empty-hint">הוסיפו את המיקום הראשון שלכם!</div>';
}
function enterPinPlacementMode(){
  if(cache.mapAddMode){ cancelMapPin(); return; }
  cache.mapAddMode=true;
  const btn=el('map-place-btn'); if(btn){ btn.textContent='✕ ביטול הוספה'; btn.classList.add('active'); }
  const hint=el('map-place-hint'); if(hint) hint.style.display='block';
  if(cache.leafletMap) cache.leafletMap.getContainer().style.cursor='crosshair';
}
function openMapPinForm(lat, lng, existingPin){
  cache.pendingPinLat=lat; cache.pendingPinLng=lng;
  cache.editingPinId=existingPin?existingPin.id:null;
  const form=el('map-pin-form'); if(!form) return;
  form.style.display='block';
  el('map-form-title').textContent=existingPin?'✏️ עריכת מיקום':'📍 מיקום חדש';
  el('pin-name').value=existingPin?existingPin.name:'';
  el('pin-note').value=existingPin?(existingPin.note||''):'';
  el('pin-type').value=existingPin?existingPin.type:'attraction';
  el('pin-adder').value=existingPin?(existingPin.addedBy||''):'';
  const ch=el('pin-coords-hint');
  if(ch){ ch.textContent=lat!=null?`📍 ${lat.toFixed(4)}, ${lng.toFixed(4)} · ${fmtDistFromVilla(lat,lng)}`:''; ch.style.display=lat!=null?'block':'none'; }
  form.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function cancelMapPin(){
  cache.mapAddMode=false; cache.editingPinId=null; cache.pendingPinLat=null; cache.pendingPinLng=null;
  if(cache.tempPinMarker){ cache.tempPinMarker.remove(); cache.tempPinMarker=null; }
  const btn=el('map-place-btn'); if(btn){ btn.textContent='📍 בחירת נקודה על המפה'; btn.classList.remove('active'); }
  const hint=el('map-place-hint'); if(hint) hint.style.display='none';
  const form=el('map-pin-form'); if(form) form.style.display='none';
  const ps=el('pin-search'); if(ps) ps.value='';
  if(cache.leafletMap) cache.leafletMap.getContainer().style.cursor='';
}
async function saveMapPin(){
  const name=el('pin-name').value.trim();
  if(!name){ alertModal('יש להזין שם למיקום','✏️'); return; }
  let lat=cache.pendingPinLat, lng=cache.pendingPinLng;
  if(lat==null){ const c=lookupCityCoords(name); if(c){lat=c[0];lng=c[1];}else{lat=VILLA_COORDS[0];lng=VILLA_COORDS[1];} }
  const type=el('pin-type').value, note=el('pin-note').value.trim(), addedBy=el('pin-adder').value;
  const pins=await loadKey('map-pins',[]);
  if(cache.editingPinId){ const p=pins.find(x=>x.id===cache.editingPinId); if(p){p.name=name;p.type=type;p.note=note;p.addedBy=addedBy;p.lat=lat;p.lng=lng;} }
  else pins.push({id:uid(),name,lat,lng,type,note,addedBy});
  await saveKey('map-pins',pins);
  if(cache.tempPinMarker){ cache.tempPinMarker.remove(); cache.tempPinMarker=null; }
  refreshUserPins(pins);
  if(!cache.mapFilters.custom) toggleMapFilter('custom');
  cancelMapPin();
}
async function deleteMapPin(id){
  if(!(await confirmModal('למחוק את המיקום?'))) return;
  let pins=await loadKey('map-pins',[]);
  pins=pins.filter(p=>p.id!==id);
  await saveKey('map-pins',pins);
  if(cache.leafletMap) cache.leafletMap.closePopup();
  refreshUserPins(pins);
}
async function editMapPinForm(id){
  const pins=await loadKey('map-pins',[]);
  const pin=pins.find(p=>p.id===id); if(!pin) return;
  if(cache.leafletMap){ cache.leafletMap.closePopup(); cache.leafletMap.setView([pin.lat,pin.lng], Math.max(cache.leafletMap.getZoom(),13)); }
  cache.mapAddMode=true;
  const btn=el('map-place-btn'); if(btn){ btn.textContent='✕ ביטול'; btn.classList.add('active'); }
  if(cache.leafletMap) cache.leafletMap.getContainer().style.cursor='crosshair';
  openMapPinForm(pin.lat,pin.lng,pin);
}

/* ============================================================
   INIT
============================================================ */
initTheme();
initGlobalListeners();
(function(){
  if(localStorage.getItem('trip-auth')==='1'){
    el('login-screen').style.display='none';
    el('app').style.display='block';
    boot();
  }
})();
</script>
</body>
</html>
