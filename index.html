<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1B4B6F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="אנגל באומבריה">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<title>משפחת אנגל — טיול לאומבריה · קיץ תשפ"ו</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Heebo:wght@300;400;500;600;700&display=swap');

:root{
  --blue:#1B4B6F; --blue-dark:#123553; --cream:#FBF7E8; --mustard:#E8A33D;
  --cypress:#2F6B4F; --terracotta:#C44536; --ink:#1A1A1A; --card:#FFFFFF;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Heebo',sans-serif; background:var(--cream); color:var(--ink); min-height:100vh;}
button{font-family:'Heebo',sans-serif; cursor:pointer;}
input,textarea,select{font-family:'Heebo',sans-serif;}

/* ===== Login screen ===== */
#login-screen{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(160deg, var(--blue) 0%, var(--blue-dark) 100%);
  padding:20px;
}
.login-box{
  background:var(--cream); border-radius:22px; padding:36px 28px; max-width:380px; width:100%;
  text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.login-box h1{font-family:'Frank Ruhl Libre',serif; font-weight:900; font-size:24px; color:var(--blue); margin-bottom:6px;}
.login-box p{font-size:13px; color:#777; margin-bottom:22px;}
.login-box input{
  width:100%; padding:14px; border-radius:12px; border:2px solid #ddd; font-size:20px;
  text-align:center; letter-spacing:6px; margin-bottom:14px;
}
.login-box input:focus{outline:none; border-color:var(--mustard);}
.login-box button{
  width:100%; padding:13px; border:none; border-radius:12px; background:var(--terracotta);
  color:#fff; font-weight:700; font-size:15px;
}
.login-error{color:var(--terracotta); font-size:12.5px; min-height:18px; margin-top:8px;}

/* ===== Tile pattern strip ===== */
.tile-strip{
  height:14px;
  background-image:linear-gradient(135deg,var(--blue) 25%,transparent 25%),
    linear-gradient(225deg,var(--blue) 25%,transparent 25%),
    linear-gradient(45deg,var(--mustard) 25%,transparent 25%),
    linear-gradient(315deg,var(--mustard) 25%,transparent 25%);
  background-position:14px 0,14px 0,0 0,0 0; background-size:14px 14px; background-repeat:repeat; opacity:.85;
}

/* ===== App shell ===== */
#app{display:none;}
.app{max-width:1100px; margin:0 auto; min-height:100vh; background:var(--cream); display:flex; flex-direction:column;}
header.top{background:var(--blue); color:var(--cream); padding:20px 22px 22px; position:relative; overflow:hidden;}
header.top::after{content:"";position:absolute;inset:0;background-image:radial-gradient(circle at 90% -10%, rgba(232,163,61,.25), transparent 55%);}
.brand{display:flex; align-items:center; justify-content:space-between; position:relative; z-index:1;}
.brand h1{font-family:'Frank Ruhl Libre',serif; font-weight:900; font-size:22px;}
.brand .sub{font-size:12.5px; opacity:.8; margin-top:2px; font-weight:300;}
.brand .lock{background:rgba(255,255,255,.12); border:none; border-radius:50%; width:36px; height:36px; color:#fff; font-size:15px;}
.fb-status{display:flex; align-items:center; gap:5px; font-size:11px; opacity:.85; margin-top:6px; position:relative; z-index:1;}
.fb-dot{width:8px; height:8px; border-radius:50%; background:#aaa; flex-shrink:0; transition:background .4s;}
.fb-dot.ok{background:#4caf7d;}
.fb-dot.err{background:#e05a4b;}
.fb-dot.warn{background:#e8a33d;}
.countdown{margin-top:16px; position:relative; z-index:1; display:flex; gap:10px; align-items:flex-end;}
.countdown .num{background:var(--mustard); color:var(--blue-dark); font-family:'Frank Ruhl Libre',serif; font-weight:900; font-size:30px; border-radius:13px; padding:7px 14px; line-height:1;}
.countdown .lbl{font-size:11.5px; padding-bottom:8px; opacity:.85;}

nav.top-nav{display:none;}
main{flex:1; padding:18px 16px 90px;}
.section-title{font-family:'Frank Ruhl Libre',serif; font-weight:700; font-size:18px; color:var(--blue); margin:18px 0 10px; display:flex; align-items:center; gap:8px;}
.section-title:first-child{margin-top:0;}
.section-title::before{content:""; width:5px; height:17px; background:var(--mustard); border-radius:3px; display:inline-block;}

.card{background:var(--card); border-radius:16px; padding:14px 16px; margin-bottom:10px; box-shadow:0 2px 10px rgba(27,75,111,.07); border:1px solid rgba(27,75,111,.06);}

nav.bottom{position:sticky; bottom:0; background:var(--card); border-top:1px solid rgba(27,75,111,.1); display:flex; justify-content:space-around; padding:7px 2px 9px; box-shadow:0 -4px 16px rgba(27,75,111,.08); z-index:50;}
nav.bottom .nitem{display:flex; flex-direction:column; align-items:center; gap:2px; font-size:9.5px; color:#9aa6ad; width:44px; background:none; border:none; padding:4px 0;}
nav.bottom .nitem.active{color:var(--blue); font-weight:700;}
nav.bottom .nitem .ic{font-size:18px;}

/* more-sheet for mobile */
#more-sheet{display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:100;}
#more-sheet .sheet{position:absolute; bottom:0; left:0; right:0; background:var(--cream); border-radius:20px 20px 0 0; padding:18px; max-width:1100px; margin:0 auto;}
#more-sheet .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:10px;}
#more-sheet .opt{background:var(--card); border-radius:14px; padding:14px 6px; text-align:center; font-size:11.5px; font-weight:600; color:var(--blue-dark); border:none;}
#more-sheet .opt .ic{font-size:22px; display:block; margin-bottom:6px;}
#more-sheet .close{display:block; width:100%; text-align:center; padding:10px; margin-top:14px; background:none; border:none; color:#999; font-size:13px;}

@media (min-width:760px){
  .app{border-radius:22px; margin:20px auto; overflow:hidden; min-height:auto; box-shadow:0 0 60px rgba(27,75,111,.1);}
  header.top{padding:24px 36px 20px;}
  nav.bottom{display:none;}
  #more-sheet{display:none !important;}
  nav.top-nav{display:flex; gap:4px; background:var(--blue-dark); padding:0 28px; overflow-x:auto;}
  nav.top-nav .nitem{color:rgba(255,255,255,.6); font-size:12.5px; padding:12px 13px; display:flex; align-items:center; gap:5px; border-bottom:3px solid transparent; cursor:pointer; white-space:nowrap; background:none; border-top:none; border-right:none; border-left:none;}
  nav.top-nav .nitem.active{color:#fff; border-bottom:3px solid var(--mustard); font-weight:600;}
  main{padding:24px 36px 40px;}
}

/* ===== generic form bits ===== */
.row{display:flex; gap:8px; margin-bottom:8px; align-items:center;}
.row input[type=text], .row input[type=time], .row input[type=tel], .row select, textarea{
  flex:1; padding:10px 12px; border:1.5px solid #e3e0d4; border-radius:10px; font-size:13.5px; background:#fff;
}
textarea{width:100%; min-height:54px; resize:vertical;}
.btn{border:none; border-radius:10px; padding:9px 14px; font-size:13px; font-weight:600; color:#fff;}
.btn-add{background:var(--cypress);}
.btn-del{background:transparent; color:var(--terracotta); font-size:17px; padding:4px 8px;}
.btn-save{background:var(--blue);}
.pill{display:inline-block; background:var(--cream); border:1.5px solid var(--cypress); color:var(--cypress); font-size:11.5px; font-weight:600; border-radius:18px; padding:5px 11px; margin:3px 4px 3px 0;}
.tag{font-size:10.5px; font-weight:700; color:#fff; border-radius:8px; padding:3px 8px; white-space:nowrap; display:inline-block; margin-left:6px;}
.tag.morning{background:var(--cypress);} .tag.noon{background:var(--mustard); color:var(--blue-dark);} .tag.evening{background:var(--blue);}
.checkrow{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid #f0ede0;}
.checkrow:last-child{border-bottom:none;}
.checkrow input[type=checkbox]{width:19px; height:19px; accent-color:var(--cypress); flex-shrink:0;}
.checkrow.done span.txt{text-decoration:line-through; color:#aaa;}
.checkrow span.txt{flex:1; font-size:13.5px;}
.small-btn{background:none; border:none; color:var(--blue); font-size:12.5px; font-weight:600; padding:6px 0;}
.muted{color:#999; font-size:12px;}
.day-card{border-inline-start:5px solid var(--mustard);}
.day-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
.day-head input{border:none; background:none; font-family:'Frank Ruhl Libre',serif; font-weight:700; font-size:15.5px; color:var(--blue); flex:1;}
.block-label{font-size:11px; font-weight:700; color:#888; margin:8px 0 3px;}
.note-card{display:flex; gap:10px;}
.avatar{width:34px; height:34px; border-radius:50%; background:var(--cypress); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; font-size:12px;}
.who{font-weight:700; font-size:12.5px; color:var(--blue-dark);}
.txt2{font-size:13px; color:#444; margin-top:2px; white-space:pre-wrap;}
.time2{font-size:10.5px; color:#aaa; margin-top:3px;}
.info-box{background:#fff; border-radius:14px; padding:14px; margin-bottom:10px; border-inline-start:4px solid var(--cypress); font-size:13px; line-height:1.7;}
.info-box b{color:var(--blue-dark);}
.warn-box{background:#fff8ec; border-inline-start:4px solid var(--mustard); border-radius:14px; padding:12px 14px; margin-bottom:10px; font-size:12.5px; color:#7a5a17;}
.fam-select{display:flex; gap:6px; overflow-x:auto; margin-bottom:12px; padding-bottom:4px;}
.fam-select button{flex-shrink:0; background:#fff; border:1.5px solid #ddd; border-radius:14px; padding:8px 13px; font-size:12px; font-weight:600; color:#777;}
.fam-select button.active{background:var(--blue); color:#fff; border-color:var(--blue);}
a.link{color:var(--blue); font-weight:600;}
.empty-hint{text-align:center; color:#bbb; font-size:12.5px; padding:18px 0;}
footer.appfoot{text-align:center; font-size:10.5px; color:#bbb; padding:10px;}

/* ===== Meal Rota ===== */
.meal-slot{border-top:1px solid #f0ede0; padding-top:10px; margin-top:8px;}
.meal-slot:first-child{border-top:none; padding-top:0; margin-top:0;}
.meal-slot-label{font-size:10.5px; font-weight:700; color:#888; margin-bottom:7px; text-transform:uppercase; letter-spacing:.4px;}
.fam-checks{display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px;}
.fam-check{display:flex; align-items:center; gap:5px; border:1.5px solid #ddd; border-radius:14px; padding:5px 10px; font-size:11.5px; font-weight:600; color:#777; cursor:pointer; background:#fafafa; transition:background .15s, color .15s, border-color .15s; user-select:none;}
.fam-check input[type=checkbox]{width:14px; height:14px; accent-color:var(--cypress); flex-shrink:0;}
.fam-check.active{background:var(--cypress); color:#fff; border-color:var(--cypress);}
.meal-dish-input{width:100%; border:1.5px solid #e3e0d4; border-radius:9px; padding:7px 11px; font-family:'Heebo',sans-serif; font-size:13px; background:#fff; margin-bottom:5px;}
.meal-dish-input:focus{outline:none; border-color:var(--mustard);}
.meal-note-input{width:100%; border:1.5px solid #f0ede0; border-radius:9px; padding:5px 11px; font-family:'Heebo',sans-serif; font-size:11.5px; color:#aaa; background:#fafafa;}
.meal-note-input:focus{outline:none; border-color:var(--mustard); background:#fff; color:#555;}
.shop-cat-bar{display:flex; gap:6px; overflow-x:auto; margin-bottom:8px; padding-bottom:4px;}
.shop-cat-tab{flex-shrink:0; background:#fff; border:1.5px solid #ddd; border-radius:20px; padding:6px 14px; font-size:12px; font-weight:600; color:#777; cursor:pointer; font-family:'Heebo',sans-serif;}
.shop-cat-tab.active{background:var(--blue); color:#fff; border-color:var(--blue);}

/* ===== Trip Map ===== */
#trip-map{height:480px; border-radius:16px; overflow:hidden; margin-bottom:10px;}
@media(max-width:759px){#trip-map{height:calc(100vh - 270px); min-height:340px;}}
.map-legend{display:flex; align-items:center; gap:12px; flex-wrap:wrap; font-size:12px; padding:10px 14px; margin-top:0;}
.map-legend b{color:var(--blue-dark); margin-left:4px;}
.map-legend span{display:flex; align-items:center; gap:5px; color:#555;}
.map-dot{width:12px; height:12px; border-radius:50%; border:2px solid rgba(255,255,255,.8); box-shadow:0 1px 4px rgba(0,0,0,.25); flex-shrink:0; display:inline-block;}

/* ===== Shared packing — family assignment ===== */
.pack-item{padding:10px 0; border-bottom:1px solid #f0ede0;}
.pack-item:last-child{border-bottom:none;}
.pack-item-top{display:flex; align-items:center; gap:10px;}
.pack-item-top input[type=checkbox]{width:19px; height:19px; accent-color:var(--cypress); flex-shrink:0;}
.pack-item-top .txt{flex:1; font-size:13.5px; line-height:1.4;}
.pack-item-top.done .txt{text-decoration:line-through; color:#aaa;}
.pack-assign-row{display:flex; flex-wrap:wrap; align-items:center; gap:5px; margin-top:6px; padding-right:29px;}
.assign-chip{display:flex; align-items:center; gap:4px; border:1.5px solid #ddd; border-radius:12px; padding:3px 9px; font-size:11px; font-weight:600; color:#888; cursor:pointer; background:#fafafa; transition:background .12s,color .12s,border-color .12s; user-select:none;}
.assign-chip input[type=checkbox]{width:12px; height:12px; accent-color:var(--cypress); flex-shrink:0;}
.assign-chip.active{background:var(--cypress); color:#fff; border-color:var(--cypress);}

/* ===== Collapsible meal rota days ===== */
details.meal-day{background:var(--card); border-radius:16px; margin-bottom:12px; box-shadow:0 2px 10px rgba(27,75,111,.07); border:1px solid rgba(27,75,111,.06); overflow:hidden;}
details.meal-day > summary{display:flex; align-items:center; gap:8px; padding:14px 16px; cursor:pointer; list-style:none; user-select:none; flex-wrap:wrap;}
details.meal-day > summary::-webkit-details-marker{display:none;}
details.meal-day > summary::marker{display:none;}
.sum-chevron{font-size:10px; color:#bbb; margin-right:auto; transition:transform .2s; flex-shrink:0;}
details.meal-day[open] .sum-chevron{transform:rotate(180deg);}
.meal-slots-wrap{padding:0 16px 16px;}

/* ===== Map CRUD ===== */
.pin-mode-btn{width:100%; padding:11px; border:2px dashed var(--blue); border-radius:12px; background:rgba(27,75,111,.04); color:var(--blue); font-weight:700; font-size:13.5px; cursor:pointer; font-family:'Heebo',sans-serif; margin-bottom:10px; transition:background .15s,color .15s; text-align:center;}
.pin-mode-btn.active{background:var(--blue); color:#fff; border-style:solid;}
.map-user-pin-card{background:#fff; border-radius:12px; padding:10px 12px; margin-bottom:8px; box-shadow:0 1px 6px rgba(27,75,111,.08); display:flex; align-items:center; gap:10px; border:1px solid rgba(27,75,111,.06);}
.map-user-pin-card .pin-info{flex:1; min-width:0;}
.pin-name{font-weight:700; font-size:13.5px; color:var(--blue-dark);}
.pin-meta{font-size:11.5px; color:#888; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.pin-actions{display:flex; gap:6px; flex-shrink:0;}
.pin-edit-btn,.pin-del-btn{border-radius:8px; padding:5px 10px; font-size:12px; font-weight:700; cursor:pointer; font-family:'Heebo',sans-serif; background:none;}
.pin-edit-btn{border:1.5px solid var(--blue); color:var(--blue);}
.pin-del-btn{border:1.5px solid var(--terracotta); color:var(--terracotta);}

#save-toast{
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
  background:var(--cypress); color:#fff; padding:8px 20px;
  border-radius:20px; font-size:13px; font-weight:600; z-index:300;
  opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap;
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login-screen">
  <div class="login-box">
    <h1>משפחת אנגל — טיול לאומבריה</h1>
    <div style="font-size:12px;color:#999;margin-bottom:6px;">קיץ תשפ"ו</div>
    <p>הזינו את קוד הגישה המשפחתי</p>
    <input id="code-input" type="text" inputmode="numeric" maxlength="6" placeholder="••••">
    <button onclick="tryLogin()">כניסה</button>
    <div class="login-error" id="login-err"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <div class="app">
    <header class="top">
      <div class="brand">
        <div>
          <h1>משפחת אנגל — טיול לאומבריה</h1>
          <div class="sub">קיץ תשפ"ו · 29.7–5.8.2026 · אומבריה, איטליה</div>
        </div>
        <button class="lock" title="נעילה" onclick="logout()">🔒</button>
      </div>
      <div class="countdown">
        <div class="num" id="countdown-num">--</div>
        <div class="lbl">ימים<br>לטיסה</div>
      </div>
      <div class="fb-status">
        <span class="fb-dot" id="fb-dot"></span>
        <span id="fb-status-text">בודק חיבור…</span>
      </div>
    </header>

    <nav class="top-nav" id="top-nav"></nav>
    <div class="tile-strip"></div>

    <main id="main-content"></main>

    <footer class="appfoot">לה פאמיליה באיטליה · קוד גישה משפחתי בלבד</footer>

    <nav class="bottom" id="bottom-nav"></nav>
  </div>
</div>

<div id="save-toast">נשמר ✓</div>

<div id="more-sheet">
  <div class="sheet">
    <div class="section-title" style="margin:0 0 4px">עוד טאבים</div>
    <div class="grid" id="more-grid"></div>
    <button class="close" onclick="closeMore()">סגירה</button>
  </div>
</div>

<script>
const ACCESS_CODE = "1309";

const TABS = [
  {id:"home", ic:"🏠", label:"בית"},
  {id:"itinerary", ic:"🗓️", label:"מסלול"},
  {id:"places", ic:"📍", label:"מקומות"},
  {id:"stay", ic:"✈️", label:"לינה וטיסות"},
  {id:"kosher", ic:"🍽️", label:"כשרות ושבת"},
  {id:"villa-kosher", ic:"🏡", label:"כשרות ליד הווילה"},
  {id:"villa-attractions", ic:"🏛️", label:"אטרקציות"},
  {id:"packing", ic:"🎒", label:"אריזה"},
  {id:"tasks", ic:"✅", label:"מטלות"},
  {id:"preflight", ic:"🧳", label:"הכנות לטיסה"},
  {id:"contacts", ic:"📞", label:"אנשי קשר"},
  {id:"board", ic:"📋", label:"לוח מודעות"},
  {id:"meal-rota", ic:"🍳", label:"רוטציית מטבח"},
  {id:"map",       ic:"🗺️", label:"מפת הטיול"},
];
const MOBILE_PRIMARY = ["home","itinerary","packing","contacts","kosher"];

const FAMILIES = ["שלמה ונאוה אנגל","אלעד ועדי לוביץ'","נצר ונעמה משאלי","דניאל ומוריה אנגל","הלל אנגל"];

const TRIP_START = new Date(2026,6,29); // Jul 29 2026
const TRIP_END = new Date(2026,7,5); // Aug 5 2026

let currentTab = "home";
let cache = {};

/* ---------- storage helpers (Firebase Realtime Database + localStorage cache) ---------- */
const FIREBASE_URL = "https://engel-italy-trip-default-rtdb.firebaseio.com";
const LS_PREFIX = 'trip-';

async function loadKey(key, fallback){
  try{
    const res = await fetch(`${FIREBASE_URL}/${encodeURIComponent(key)}.json`);
    if(!res.ok) throw new Error('bad response');
    const data = await res.json();
    if(data === null || data === undefined){
      const cached = localStorage.getItem(LS_PREFIX + key);
      if(cached){ try{ return JSON.parse(cached); }catch(e){} }
      return fallback;
    }
    localStorage.setItem(LS_PREFIX + key, JSON.stringify(data));
    return data;
  }catch(e){
    console.error("load fail", key, e);
    const cached = localStorage.getItem(LS_PREFIX + key);
    if(cached){ try{ setFbStatus(false, true); return JSON.parse(cached); }catch(e2){} }
    return fallback;
  }
}
async function saveKey(key, value){
  localStorage.setItem(LS_PREFIX + key, JSON.stringify(value));
  try{
    await fetch(`${FIREBASE_URL}/${encodeURIComponent(key)}.json`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(value)
    });
    setFbStatus(true);
    showSaveToast();
  }catch(e){ console.error("save fail", key, e); setFbStatus(false); }
}

function setFbStatus(ok, offline=false){
  const dot = document.getElementById('fb-dot');
  const txt = document.getElementById('fb-status-text');
  if(!dot) return;
  if(offline){
    dot.className = 'fb-dot warn';
    txt.textContent = 'מציג נתונים שמורים — לא מחובר';
  } else {
    dot.className = 'fb-dot ' + (ok ? 'ok' : 'err');
    txt.textContent = ok ? 'מחובר ✓' : 'שמירה נכשלה — בדקו חיבור';

function tryLogin(){
  const v = document.getElementById('code-input').value.trim();

    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';

  }
}

/* ---------- nav rendering ---------- */
function buildNav(){
  const topNav = document.getElementById('top-nav');
  topNav.innerHTML = TABS.map(t=>`<button class="nitem ${t.id===currentTab?'active':''}" onclick="switchTab('${t.id}')">${t.ic} ${t.label}</button>`).join('');

  const bottomNav = document.getElementById('bottom-nav');
  let html = MOBILE_PRIMARY.map(id=>{
    const t = TABS.find(x=>x.id===id);
    return `<button class="nitem ${t.id===currentTab?'active':''}" onclick="switchTab('${t.id}')"><span class="ic">${t.ic}</span>${t.label}</button>`;
  }).join('');
  const isMoreActive = !MOBILE_PRIMARY.includes(currentTab);
  html += `<button class="nitem ${isMoreActive?'active':''}" onclick="openMore()"><span class="ic">⋯</span>עוד</button>`;
  bottomNav.innerHTML = html;
}
function openMore(){
  const grid = document.getElementById('more-grid');
  const others = TABS.filter(t=>!MOBILE_PRIMARY.includes(t.id));
  grid.innerHTML = others.map(t=>`<button class="opt" onclick="switchTab('${t.id}'); closeMore();"><span class="ic">${t.ic}</span>${t.label}</button>`).join('');
  document.getElementById('more-sheet').style.display='block';
}
function closeMore(){ document.getElementById('more-sheet').style.display='none'; }

async function switchTab(id){
  currentTab = id;
  buildNav();
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="empty-hint">טוען…</div>';
  const renderer = RENDERERS[id];
  await renderer();
}

/* ---------- boot ---------- */
function updateCountdown(){
  const now = new Date();
  const diff = Math.ceil((TRIP_START - now) / (1000*60*60*24));
  document.getElementById('countdown-num').textContent = diff > 0 ? diff : (diff===0?'🎉':'בדרך');
}

async function boot(){
  updateCountdown();
  checkFbConnection();
  setInterval(checkFbConnection, 30000);
  await switchTab('home');
}

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function exportData(){
  const keys = ['board','itinerary-days','places','stay-flights','kosher-spots','synagogues','packing-shared','packing-personal','tasks','preflight','contacts','villa-attractions-custom','meal-rota','shopping-list','map-pins'];
  const out = {};
  for(const k of keys){
    const v = await loadKey(k, null);
    if(v !== null) out[k] = v;
  }
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='italy-trip-backup.json'; a.click();
  URL.revokeObjectURL(url);
}
function triggerImport(){
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='.json';
  inp.onchange = async e => {
    const f = e.target.files[0]; if(!f) return;
    try{
      const data = JSON.parse(await f.text());
      for(const [key, value] of Object.entries(data)) await saveKey(key, value);
      await switchTab(currentTab);
    }catch(e2){ alert('קובץ לא תקין — ודאו שזה קובץ גיבוי מהאפליקציה'); }
  };
  inp.click();
}

function renderCustomAttractions(items){
  const el = document.getElementById('custom-attractions-list');
  if(!el) return;
  if(!items.length){
    el.innerHTML = '<div class="card empty-hint" style="margin-bottom:10px;">עדיין לא הוספתם אטרקציות — השתמשו בטופס למטה להוסיף המלצות משלכם!</div>';
    return;
  }
  el.innerHTML = items.map(a => `
    <div class="card" style="border-inline-start:4px solid var(--blue); margin-bottom:10px; position:relative;">
      <button class="btn-del" onclick="delCustomAttraction('${a.id}')" style="position:absolute;top:10px;left:10px;">✕</button>
      <div style="padding-left:28px;">
        <b style="font-size:14px; color:var(--blue-dark);">${escapeHtml(a.name)}</b>
        ${a.dist ? `<span style="font-size:11px; color:#888; margin-right:8px;">${escapeHtml(a.dist)}</span>` : ''}
        ${a.desc ? `<div style="font-size:13px; color:#444; margin-top:5px; line-height:1.6;">${escapeHtml(a.desc)}</div>` : ''}
        <div class="muted" style="margin-top:6px;">
          ${a.duration ? `⏱ ${escapeHtml(a.duration)}` : ''}
          ${a.duration && (a.ages || a.price) ? ' · ' : ''}
          ${a.ages ? escapeHtml(a.ages) : ''}
          ${a.ages && a.price ? ' · ' : ''}
          ${a.price ? escapeHtml(a.price) : ''}
        </div>
      </div>
    </div>`).join('');
}

async function addCustomAttraction(){
  const name = document.getElementById('attr-name').value.trim();
  if(!name) return;
  const item = {
    id: uid(),
    name,
    dist:     document.getElementById('attr-dist').value.trim(),
    duration: document.getElementById('attr-duration').value.trim(),
    desc:     document.getElementById('attr-desc').value.trim(),
    ages:     document.getElementById('attr-ages').value.trim(),
    price:    document.getElementById('attr-price').value.trim(),
  };
  const list = await loadKey('villa-attractions-custom', []);
  list.push(item);
  await saveKey('villa-attractions-custom', list);
  ['attr-name','attr-dist','attr-duration','attr-desc','attr-ages','attr-price'].forEach(id => {
    document.getElementById(id).value = '';
  });
  renderCustomAttractions(list);
}

async function delCustomAttraction(id){
  let list = await loadKey('villa-attractions-custom', []);
  list = list.filter(a => a.id !== id);
  await saveKey('villa-attractions-custom', list);
  renderCustomAttractions(list);
}

async function toggleCheck(storageKey, id, checked, personKey){
  if(storageKey==='packing-personal'){
    const all = await loadKey('packing-personal', {});
    const list = all[personKey] || defaultPersonalPacking();
    const it = list.find(x=>x.id===id); if(it) it.done = checked;
    all[personKey] = list; await saveKey('packing-personal', all);
  } else {
    const list = await loadKey(storageKey, []);
    const it = list.find(x=>x.id===id); if(it) it.done = checked;
    await saveKey(storageKey, list);
  }
}
async function delCheck(storageKey, id, personKey){
  if(storageKey==='packing-personal'){
    const all = await loadKey('packing-personal', {});
    let list = all[personKey] || [];
    list = list.filter(x=>x.id!==id);
    all[personKey]=list; await saveKey('packing-personal', all);
    renderPersonalList(all);
  } else {
    let list = await loadKey(storageKey, []);
    list = list.filter(x=>x.id!==id);
    await saveKey(storageKey, list);
    if(storageKey==='packing-shared') renderSharedPackingList(list);
    if(storageKey==='tasks') RENDERERS.tasks();
  }

function renderSharedPackingList(items){
  const el = document.getElementById('shared-list'); if(!el) return;

  el.innerHTML = items.map(it=>{
    const assigned = it.assignedTo||[];
    const chips = FAMILIES.map(f=>{
      const isOn=assigned.includes(f), sf=f.replace(/'/g,"\\'");
      return `<label class="assign-chip${isOn?' active':''}"><input type="checkbox"${isOn?' checked':''} onchange="togglePackingAssignment('${it.id}','${sf}',this.checked);this.parentElement.classList.toggle('active',this.checked)">${escapeHtml(f)}</label>`;
    }).join('');
    return `<div class="pack-item">
      <div class="pack-item-top${it.done?' done':''}">
        <input type="checkbox"${it.done?' checked':''} onchange="toggleCheck('packing-shared','${it.id}',this.checked,null)">

        <button class="btn-del" onclick="delCheck('packing-shared','${it.id}',null)">✕</button>

      <div class="pack-assign-row"><span class="muted" style="font-size:10.5px;flex-shrink:0">👥 מי מביא:</span>${chips}</div>
    </div>`;
  }).join('');
}

async function togglePackingAssignment(itemId, family, checked){
  const list=await loadKey('packing-shared',[]);
  const item=list.find(x=>x.id===itemId); if(!item) return;
  if(!item.assignedTo) item.assignedTo=[];
  if(checked){ if(!item.assignedTo.includes(family)) item.assignedTo.push(family); }
  else { item.assignedTo=item.assignedTo.filter(f=>f!==family); }
  await saveKey('packing-shared',list);
}

   MEAL ROTA & KITCHEN SCHEDULE
================================================================= */

const MEAL_CAT_LABELS = {pareve:'פרווה', dairy:'חלבי', produce:'ירקות ופירות', cleaning:'ניקיון', other:'אחר'};
const MEAL_CAT_COLORS = {pareve:'var(--cypress)', dairy:'var(--blue)', produce:'#5c8f3e', cleaning:'#7a7a7a', other:'#a0a0a0'};

function defaultMealRota(){
  const days=[], endMs=TRIP_END.getTime();
  let d=new Date(TRIP_START), dayNum=1;
  while(d.getTime()<=endMs){
    const dow=d.getDay(), isShabbat=dow===6, isErevShabbat=dow===5;
    const isArrival=dayNum===1, isDeparture=d.getTime()===endMs;
    const dateStr=d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'});
    const HE_DAY=['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','שבת'][dow];
    let dayLabel, meals;
    if(isShabbat){
      dayLabel='שבת קודש';
      meals=[
        {slot:'shabbat-lunch',   label:'🍷 סעודת שחרית',  families:[], dish:'', note:''},
        {slot:'seudah-shlishit', label:'🍞 סעודה שלישית', families:[], dish:'', note:''},
        {slot:'melave-malka',    label:'✨ מלווה מלכה',   families:[], dish:'', note:'הבדלה: ~21:10'}
      ];
    } else if(isErevShabbat){
      dayLabel=`יום ${HE_DAY} — ערב שבת`;
      meals=[
        {slot:'breakfast',      label:'☀️ ארוחת בוקר',   families:[], dish:'', note:''},
        {slot:'lunch',          label:'🌤 ארוחת צהריים',  families:[], dish:'', note:''},
        {slot:'shabbat-dinner', label:'🕯️ סעודת שבת',    families:[], dish:'', note:'הדלקת נרות: 20:06'}
      ];
    } else if(isArrival){
      dayLabel=`יום ${HE_DAY} — הגעה לווילה`;
      meals=[
        {slot:'breakfast', label:'☀️ ארוחת בוקר',   families:[], dish:'', note:'טיסה 18:00 — אכילה בנתב"ג'},
        {slot:'lunch',     label:'🌤 ארוחת צהריים',  families:[], dish:'', note:''},
        {slot:'dinner',    label:'🌙 ארוחת ערב',     families:[], dish:'ארוחת פתיחה — ראשונה בווילה 🎉', note:'נחיתה ~20:40 ✈️'}
      ];
    } else if(isDeparture){
      dayLabel=`יום ${HE_DAY} — יום עזיבה`;
      meals=[
        {slot:'breakfast', label:'☀️ ארוחת בוקר אחרונה', families:[], dish:'', note:"צ'ק-אאוט עד 10:00 🧳"}
      ];
    } else {
      dayLabel=`יום ${HE_DAY}`;
      meals=[
        {slot:'breakfast', label:'☀️ ארוחת בוקר',  families:[], dish:'', note:''},
        {slot:'lunch',     label:'🌤 ארוחת צהריים', families:[], dish:'', note:''},
        {slot:'dinner',    label:'🌙 ארוחת ערב',    families:[], dish:'', note:''}
      ];
    }
    days.push({id:uid(), date:dateStr, dayNum, dayLabel, isShabbat, isErevShabbat, meals});
    d.setDate(d.getDate()+1); dayNum++;
  }
  return days;
}

function buildMealRotaHtml(days, shopping){
  const dayCards = days.map(day=>{
    const accent = day.isShabbat ? 'var(--terracotta)' : day.isErevShabbat ? 'var(--mustard)' : 'var(--blue)';
    const badge = day.isShabbat
      ? `<span class="tag" style="background:var(--terracotta)">שבת קודש ✨</span>`
      : day.isErevShabbat
      ? `<span class="tag" style="background:var(--mustard);color:var(--blue-dark)">ערב שבת 🕯️</span>`
      : '';
    const slots = day.meals.map(meal=>{
      const famChecks = FAMILIES.map(f=>{
        const checked=(meal.families||[]).includes(f);
        const sf=f.replace(/'/g,"\\'"), ss=meal.slot;
        return `<label class="fam-check${checked?' active':''}"><input type="checkbox"${checked?' checked':''} onchange="toggleMealFamily('${day.id}','${ss}','${sf}',this.checked);this.parentElement.classList.toggle('active',this.checked)">${escapeHtml(f)}</label>`;
      }).join('');
      return `<div class="meal-slot">
        <div class="meal-slot-label">${meal.label}</div>
        <div class="fam-checks">${famChecks}</div>
        <input class="meal-dish-input" type="text" value="${escapeHtml(meal.dish||'')}" placeholder="מה מכינים? (תפריט, רעיון...)" onblur="saveMealField('${day.id}','${meal.slot}','dish',this.value)">
        <input class="meal-note-input" type="text" value="${escapeHtml(meal.note||'')}" placeholder="הערה (שעה, אלרגיה, קניות...)" onblur="saveMealField('${day.id}','${meal.slot}','note',this.value)">
      </div>`;
    }).join('');
    return `<details class="meal-day" style="border-inline-start:5px solid ${accent}" open>
      <summary>
        <span style="font-family:'Frank Ruhl Libre',serif;font-weight:700;font-size:16px;color:var(--blue-dark)">יום ${day.dayNum}</span>
        <span style="font-size:13px;color:var(--blue);font-weight:600">${escapeHtml(day.dayLabel)}</span>
        <span class="muted" style="font-size:11px">${day.date}</span>
        ${badge}
        <span class="sum-chevron">▼</span>
      </summary>
      <div class="meal-slots-wrap">${slots}</div>
    </details>`;
  }).join('');

  const allCats=['all','pareve','dairy','produce','cleaning','other'];
  const catLabels={all:'הכל',...MEAL_CAT_LABELS};
  const curCat=cache.mealShopCat||'all';
  const catBar=allCats.map(c=>`<button class="shop-cat-tab${c===curCat?' active':''}" onclick="filterShopCat('${c}')">${catLabels[c]}</button>`).join('');
  const filtered=curCat==='all' ? shopping : shopping.filter(x=>x.category===curCat);
  const hasDone=shopping.some(x=>x.done);
  const shopRows=filtered.length ? filtered.map(item=>{
    const col=MEAL_CAT_COLORS[item.category]||'#aaa';
    const lbl=MEAL_CAT_LABELS[item.category]||item.category;
    return `<div class="checkrow${item.done?' done':''}">
      <input type="checkbox"${item.done?' checked':''} onchange="toggleShoppingItem('${item.id}',this.checked)">
      <span class="txt">${escapeHtml(item.text)}</span>
      <span class="tag" style="background:${col};font-size:9.5px">${lbl}</span>
      ${item.addedBy?`<span class="muted" style="font-size:10.5px;margin-right:4px">${escapeHtml(item.addedBy)}</span>`:''}
      <button class="btn-del" onclick="delShoppingItem('${item.id}')">✕</button>
    </div>`;
  }).join('') : `<div class="empty-hint">אין פריטים בקטגוריה זו</div>`;

  return `
    <div class="section-title">🍳 רוטציית מטבח</div>
    <div class="warn-box" style="margin-bottom:14px">כולם יכולים לערוך — סמנו משפחות אחראיות וציינו מה מכינים. נשמר אוטומטית.</div>
    ${dayCards}
    <div class="section-title" style="margin-top:8px">🛒 רשימת קניות</div>
    <div class="card" style="margin-bottom:10px">
      <div class="row"><input type="text" id="shop-text" placeholder="פריט לקנות..."></div>
      <div class="row">
        <select id="shop-cat">${['pareve','dairy','produce','cleaning','other'].map(c=>`<option value="${c}">${MEAL_CAT_LABELS[c]}</option>`).join('')}</select>
        <select id="shop-adder"><option value="">מי מוסיף?</option>${FAMILIES.map(f=>`<option>${escapeHtml(f)}</option>`).join('')}</select>
        <button class="btn btn-add" onclick="addShoppingItem()">+</button>
      </div>
    </div>
    <div class="shop-cat-bar">${catBar}</div>
    <div class="card" style="margin-top:8px" id="shop-items-list">${shopRows}</div>
    ${hasDone?`<button class="small-btn" style="margin-top:6px" onclick="clearDoneShopping()">🗑️ מחיקת פריטים שנרכשו</button>`:''}
  `;
}

async function toggleMealFamily(dayId, slot, family, checked){
  const days=await loadKey('meal-rota',[]);
  const day=days.find(d=>d.id===dayId); if(!day) return;
  const meal=day.meals.find(m=>m.slot===slot); if(!meal) return;
  if(!meal.families) meal.families=[];
  if(checked){ if(!meal.families.includes(family)) meal.families.push(family); }
  else { meal.families=meal.families.filter(f=>f!==family); }
  await saveKey('meal-rota', days);
}

async function saveMealField(dayId, slot, field, value){
  const days=await loadKey('meal-rota',[]);
  const day=days.find(d=>d.id===dayId); if(!day) return;
  const meal=day.meals.find(m=>m.slot===slot); if(!meal) return;
  meal[field]=value;
  await saveKey('meal-rota', days);
}

async function addShoppingItem(){
  const text=document.getElementById('shop-text').value.trim(); if(!text) return;
  const category=document.getElementById('shop-cat').value;
  const addedBy=document.getElementById('shop-adder').value;
  const shopping=await loadKey('shopping-list',[]);
  shopping.push({id:uid(), text, category, done:false, addedBy});
  await saveKey('shopping-list', shopping);
  document.getElementById('shop-text').value='';
  await RENDERERS['meal-rota']();
}

async function toggleShoppingItem(id, checked){
  const shopping=await loadKey('shopping-list',[]);
  const item=shopping.find(x=>x.id===id); if(item) item.done=checked;
  await saveKey('shopping-list', shopping);
}

async function delShoppingItem(id){
  let shopping=await loadKey('shopping-list',[]);
  shopping=shopping.filter(x=>x.id!==id);
  await saveKey('shopping-list', shopping);
  await RENDERERS['meal-rota']();
}

async function clearDoneShopping(){
  if(!confirm('למחוק את כל הפריטים שנרכשו?')) return;
  let shopping=await loadKey('shopping-list',[]);
  shopping=shopping.filter(x=>!x.done);
  await saveKey('shopping-list', shopping);
  await RENDERERS['meal-rota']();
}

async function filterShopCat(cat){
  cache.mealShopCat=cat;
  await RENDERERS['meal-rota']();
}

  {name:'רומא — הגטו היהודי',          coords:[41.8935,12.4780], desc:'~60 ק"מ · יום מלא'},
];

function lookupCityCoords(text){
  if(!text || !text.trim()) return null;
  const lower = text.trim().toLowerCase();
  if(CITY_COORDS_MAP[lower]) return CITY_COORDS_MAP[lower];
  for(const [key, coords] of Object.entries(CITY_COORDS_MAP)){
    if(lower.includes(key) || key.includes(lower)) return coords;
  }
  return null;
}

function jitter(coords){
  return [coords[0]+(Math.random()-.5)*0.003, coords[1]+(Math.random()-.5)*0.003];
}

function mapPin(color, inner){
  return L.divIcon({
    className:'',
    html:`<div style="width:32px;height:32px;background:${color};border:3px solid rgba(255,255,255,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.4);cursor:pointer">${inner}</div>`,
    iconSize:[32,32], iconAnchor:[16,16], popupAnchor:[0,-20]
  });
}

RENDERERS.map = async function(){
  if(typeof L === 'undefined'){
    document.getElementById('main-content').innerHTML = `<div class="card" style="text-align:center;padding:40px 20px"><div style="font-size:48px">🗺️</div><div style="margin-top:12px;color:#888;font-size:13.5px">המפה דורשת חיבור לאינטרנט לטעינה ראשונית</div></div>`;
    return;
  }
  if(cache.leafletMap){ cache.leafletMap.remove(); cache.leafletMap=null; }
  cache.mapAddMode=false; cache.editingPinId=null; cache.pendingPinLat=null; cache.pendingPinLng=null;
  cache.tempPinMarker=null; cache.mapUserPinMarkers=[];

  const [itinerary, kosherSpots, customAttractions, userPins] = await Promise.all([
    loadKey('itinerary-days',[]),
    loadKey('kosher-spots',[]),
    loadKey('villa-attractions-custom',[]),
    loadKey('map-pins',[])
  ]);

  document.getElementById('main-content').innerHTML = `
    <div class="section-title">🗺️ מפת הטיול</div>
    <div id="trip-map"></div>
    <div class="card map-legend">
      <b>מקרא:</b>
      <span><span class="map-dot" style="background:#E8A33D"></span>הווילה</span>
      <span><span class="map-dot" style="background:#1B4B6F"></span>יעדי מסלול</span>
      <span><span class="map-dot" style="background:#C44536"></span>אטרקציות</span>
      <span><span class="map-dot" style="background:#2F6B4F"></span>מסעדות כשרות</span>
      <span><span class="map-dot" style="background:#7a7a7a"></span>מיקומים מותאמים</span>
    </div>
    <p class="muted" style="margin-top:4px;font-size:11px">לחצו על פין לפרטים · צבטו/גלגלת לזום</p>

    <div class="section-title" style="margin-top:18px">📍 מיקומים מותאמים</div>
    <button id="map-place-btn" class="pin-mode-btn" onclick="enterPinPlacementMode()">📍 הוסף מיקום</button>
    <div id="map-place-hint" style="display:none;background:rgba(27,75,111,.85);color:#fff;text-align:center;padding:10px 14px;border-radius:10px;margin-bottom:10px;font-size:13px;font-weight:600">
      לחצו על המפה לסימון המיקום הרצוי 🖱️
    </div>
    <div id="map-pin-form" class="card" style="display:none;margin-bottom:10px">
      <div style="font-weight:700;font-size:13.5px;color:var(--blue-dark);margin-bottom:10px" id="map-form-title">📍 מיקום חדש</div>
      <div id="pin-coords-hint" style="display:none;font-size:11.5px;color:var(--cypress);font-weight:600;margin-bottom:8px;background:#f0faf4;padding:6px 10px;border-radius:8px"></div>
      <div class="row"><input type="text" id="pin-name" placeholder="שם המיקום *"></div>
      <div class="row">
        <select id="pin-type"><option value="attraction">🏛️ אטרקציה</option><option value="kosher">🍽️ מסעדה / מקום כשר</option><option value="other">📌 אחר</option></select>
        <select id="pin-adder"><option value="">מי מוסיף?</option>${FAMILIES.map(f=>`<option>${escapeHtml(f)}</option>`).join('')}</select>
      </div>
      <div class="row"><input type="text" id="pin-note" placeholder="הערה (שעות, מחיר, טיפ...)"></div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-add" style="flex:1" onclick="saveMapPin()">שמירה</button>
        <button class="btn" style="flex:1;background:#e0ddd0;color:#555" onclick="cancelMapPin()">ביטול</button>
      </div>
    </div>
    <div id="map-user-pins-list"></div>
  `;

  const map = L.map('trip-map').setView(VILLA_COORDS, 9);
  cache.leafletMap = map;

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom:18
  }).addTo(map);

  map.on('click', function(e){
    if(!cache.mapAddMode) return;
    if(cache.tempPinMarker){ cache.tempPinMarker.remove(); }
    cache.tempPinMarker = L.marker([e.latlng.lat,e.latlng.lng],{icon:mapPin('#555','📍')}).addTo(map);
    const hint=document.getElementById('map-place-hint'); if(hint) hint.style.display='none';
    openMapPinForm(e.latlng.lat, e.latlng.lng, null);
  });

  // Villa
  L.marker(VILLA_COORDS, {icon: mapPin('#E8A33D','🏡'), zIndexOffset:1000})
    .bindPopup('<div dir="rtl"><b>🏡 הווילה שלנו</b><br>Villa La Corona, אוטריקולי<br><small style="color:#888">Strada Vallefigliola, Otricoli</small></div>')
    .addTo(map);

  // Hardcoded attractions
  HARDCODED_ATTRACTIONS.forEach(a=>{
    L.marker(jitter(a.coords), {icon: mapPin('#C44536','🏛️')})
      .bindPopup(`<div dir="rtl"><b>🏛️ ${a.name}</b><br><small style="color:#888">${a.desc}</small></div>`)
      .addTo(map);
  });

  // Itinerary day pins
  itinerary.forEach(day=>{
    if(!day.city) return;
    const coords=lookupCityCoords(day.city); if(!coords) return;
    const activities=[day.morning,day.noon,day.evening].filter(Boolean).join(' · ');
    const inner=`<span style="font-family:'Frank Ruhl Libre',serif;font-weight:700;color:#fff;font-size:12px">${day.num}</span>`;
    L.marker(jitter(coords), {icon: mapPin('#1B4B6F',inner)})
      .bindPopup(`<div dir="rtl"><b>יום ${day.num} — ${escapeHtml(day.city)}</b>${activities?`<br><small style="color:#888">${escapeHtml(activities)}</small>`:''}</div>`)
      .addTo(map);
  });

  kosherSpots.forEach(spot=>{

      .bindPopup(`<div dir="rtl"><b>🍽️ ${escapeHtml(spot.name)}</b><br>${escapeHtml(spot.city)}${spot.note?`<br><small style="color:#888">${escapeHtml(spot.note)}</small>`:''}</div>`)
      .addTo(map);
  });

  // Custom villa attractions
  customAttractions.forEach(a=>{
    const coords=lookupCityCoords(a.name)||lookupCityCoords(a.dist||''); if(!coords) return;
    L.marker(jitter(coords), {icon: mapPin('#C44536','⭐')})
      .bindPopup(`<div dir="rtl"><b>⭐ ${escapeHtml(a.name)}</b>${a.desc?`<br><small style="color:#888">${escapeHtml(a.desc)}</small>`:''}</div>`)
      .addTo(map);
  });

  // User-created CRUD pins
  refreshUserPins(map, userPins);
};

/* ----- Map CRUD helpers ----- */
const MAP_PIN_ICONS={kosher:'🍽️',attraction:'🏛️',other:'📌'};
const MAP_PIN_COLORS={kosher:'#2F6B4F',attraction:'#C44536',other:'#7a7a7a'};

function refreshUserPins(map, pins){
  (cache.mapUserPinMarkers||[]).forEach(m=>m.remove());
  cache.mapUserPinMarkers=[];
  pins.forEach(pin=>{
    const ic=MAP_PIN_ICONS[pin.type]||'📌', col=MAP_PIN_COLORS[pin.type]||'#7a7a7a';
    const popup=`<div dir="rtl" style="min-width:160px"><b>${ic} ${escapeHtml(pin.name)}</b>${pin.note?`<br><small style="color:#888">${escapeHtml(pin.note)}</small>`:''}<div style="margin-top:8px;display:flex;gap:6px;justify-content:flex-end"><button onclick="editMapPinForm('${pin.id}')" style="border:1.5px solid #1B4B6F;color:#1B4B6F;background:none;border-radius:7px;padding:4px 9px;font-size:11px;font-family:Heebo,sans-serif;cursor:pointer">✏️ ערוך</button><button onclick="deleteMapPin('${pin.id}')" style="border:1.5px solid #C44536;color:#C44536;background:none;border-radius:7px;padding:4px 9px;font-size:11px;font-family:Heebo,sans-serif;cursor:pointer">🗑️ מחק</button></div></div>`;
    const marker=L.marker([pin.lat,pin.lng],{icon:mapPin(col,ic)}).bindPopup(popup).addTo(map);
    cache.mapUserPinMarkers.push(marker);
  });
  renderUserPinList(pins);
}

function renderUserPinList(pins){
  const el=document.getElementById('map-user-pins-list'); if(!el) return;
  el.innerHTML=pins.length ? pins.map(pin=>`
    <div class="map-user-pin-card">
      <span style="font-size:22px">${MAP_PIN_ICONS[pin.type]||'📌'}</span>
      <div class="pin-info"><div class="pin-name">${escapeHtml(pin.name)}</div>${pin.note?`<div class="pin-meta">${escapeHtml(pin.note)}</div>`:''}</div>
      <div class="pin-actions"><button class="pin-edit-btn" onclick="editMapPinForm('${pin.id}')">✏️</button><button class="pin-del-btn" onclick="deleteMapPin('${pin.id}')">🗑️</button></div>
    </div>`).join('') : '<div class="empty-hint" style="padding:12px 0">הוסיפו את המיקום הראשון שלכם!</div>';
}

function enterPinPlacementMode(){
  if(cache.mapAddMode){ cancelMapPin(); return; }
  cache.mapAddMode=true;
  const btn=document.getElementById('map-place-btn');
  if(btn){ btn.textContent='✕ ביטול הוספה'; btn.classList.add('active'); }
  const hint=document.getElementById('map-place-hint'); if(hint) hint.style.display='block';
  if(cache.leafletMap) cache.leafletMap.getContainer().style.cursor='crosshair';
}

function openMapPinForm(lat, lng, existingPin){
  cache.pendingPinLat=lat; cache.pendingPinLng=lng;
  cache.editingPinId=existingPin?existingPin.id:null;
  const form=document.getElementById('map-pin-form'); if(!form) return;
  form.style.display='block';
  document.getElementById('map-form-title').textContent=existingPin?'✏️ עריכת מיקום':'📍 מיקום חדש';
  document.getElementById('pin-name').value=existingPin?existingPin.name:'';
  document.getElementById('pin-note').value=existingPin?(existingPin.note||''):'';
  document.getElementById('pin-type').value=existingPin?existingPin.type:'attraction';
  document.getElementById('pin-adder').value=existingPin?(existingPin.addedBy||''):'';
  const ch=document.getElementById('pin-coords-hint');
  if(ch){ ch.textContent=lat!=null?`📍 מיקום: ${lat.toFixed(4)}, ${lng.toFixed(4)}`:''; ch.style.display=lat!=null?'block':'none'; }
  form.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function cancelMapPin(){
  cache.mapAddMode=false; cache.editingPinId=null; cache.pendingPinLat=null; cache.pendingPinLng=null;
  if(cache.tempPinMarker){ cache.tempPinMarker.remove(); cache.tempPinMarker=null; }
  const btn=document.getElementById('map-place-btn');
  if(btn){ btn.textContent='📍 הוסף מיקום'; btn.classList.remove('active'); }
  const hint=document.getElementById('map-place-hint'); if(hint) hint.style.display='none';
  const form=document.getElementById('map-pin-form'); if(form) form.style.display='none';
  if(cache.leafletMap) cache.leafletMap.getContainer().style.cursor='';
}

async function saveMapPin(){
  const name=document.getElementById('pin-name').value.trim();
  if(!name){ alert('יש להזין שם למיקום'); return; }
  let lat=cache.pendingPinLat, lng=cache.pendingPinLng;
  if(lat==null){ const c=lookupCityCoords(name); if(c){lat=c[0];lng=c[1];}else{lat=VILLA_COORDS[0];lng=VILLA_COORDS[1];} }
  const type=document.getElementById('pin-type').value;
  const note=document.getElementById('pin-note').value.trim();
  const addedBy=document.getElementById('pin-adder').value;
  const pins=await loadKey('map-pins',[]);
  if(cache.editingPinId){
    const p=pins.find(x=>x.id===cache.editingPinId);
    if(p){p.name=name;p.type=type;p.note=note;p.addedBy=addedBy;p.lat=lat;p.lng=lng;}
  } else {
    pins.push({id:uid(),name,lat,lng,type,note,addedBy});
  }
  await saveKey('map-pins',pins);
  refreshUserPins(cache.leafletMap,pins);
  cancelMapPin();
}

async function deleteMapPin(id){
  if(!confirm('למחוק את המיקום?')) return;
  let pins=await loadKey('map-pins',[]);
  pins=pins.filter(p=>p.id!==id);
  await saveKey('map-pins',pins);
  if(cache.leafletMap) cache.leafletMap.closePopup();
  refreshUserPins(cache.leafletMap,pins);
}

async function editMapPinForm(id){
  const pins=await loadKey('map-pins',[]);
  const pin=pins.find(p=>p.id===id); if(!pin) return;
  if(cache.leafletMap) cache.leafletMap.closePopup();
  cache.mapAddMode=true;
  const btn=document.getElementById('map-place-btn');
  if(btn){ btn.textContent='✕ ביטול'; btn.classList.add('active'); }
  if(cache.leafletMap) cache.leafletMap.getContainer().style.cursor='crosshair';
  openMapPinForm(pin.lat,pin.lng,pin);
}
