<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1B4B6F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="אנגל באומבריה">
<link rel="manifest" href="manifest.json">
<title>משפחת אנגל — טיול לאומבריה · קיץ תשפ"ו</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Heebo:wght@300;400;500;600;700&display=swap');

:root{
  --blue:#1B4B6F; --blue-dark:#123553; --cream:#FBF7E8; --mustard:#E8A33D;
  --cypress:#2F6B4F; --terracotta:#C44536; --ink:#1A1A1A; --card:#FFFFFF;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Heebo',sans-serif; background:var(--cream); color:var(--ink); min-height:100vh;}
button{font-family:'Heebo',sans-serif; cursor:pointer;}
input,textarea,select{font-family:'Heebo',sans-serif;}

/* ===== Login screen ===== */
#login-screen{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(160deg, var(--blue) 0%, var(--blue-dark) 100%);
  padding:20px;
}
.login-box{
  background:var(--cream); border-radius:22px; padding:36px 28px; max-width:380px; width:100%;
  text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.login-box h1{font-family:'Frank Ruhl Libre',serif; font-weight:900; font-size:24px; color:var(--blue); margin-bottom:6px;}
.login-box p{font-size:13px; color:#777; margin-bottom:22px;}
.login-box input{
  width:100%; padding:14px; border-radius:12px; border:2px solid #ddd; font-size:20px;
  text-align:center; letter-spacing:6px; margin-bottom:14px;
}
.login-box input:focus{outline:none; border-color:var(--mustard);}
.login-box button{
  width:100%; padding:13px; border:none; border-radius:12px; background:var(--terracotta);
  color:#fff; font-weight:700; font-size:15px;
}
.login-error{color:var(--terracotta); font-size:12.5px; min-height:18px; margin-top:8px;}

/* ===== Tile pattern strip ===== */
.tile-strip{
  height:14px;
  background-image:linear-gradient(135deg,var(--blue) 25%,transparent 25%),
    linear-gradient(225deg,var(--blue) 25%,transparent 25%),
    linear-gradient(45deg,var(--mustard) 25%,transparent 25%),
    linear-gradient(315deg,var(--mustard) 25%,transparent 25%);
  background-position:14px 0,14px 0,0 0,0 0; background-size:14px 14px; background-repeat:repeat; opacity:.85;
}

/* ===== App shell ===== */
#app{display:none;}
.app{max-width:1100px; margin:0 auto; min-height:100vh; background:var(--cream); display:flex; flex-direction:column;}
header.top{background:var(--blue); color:var(--cream); padding:20px 22px 22px; position:relative; overflow:hidden;}
header.top::after{content:"";position:absolute;inset:0;background-image:radial-gradient(circle at 90% -10%, rgba(232,163,61,.25), transparent 55%);}
.brand{display:flex; align-items:center; justify-content:space-between; position:relative; z-index:1;}
.brand h1{font-family:'Frank Ruhl Libre',serif; font-weight:900; font-size:22px;}
.brand .sub{font-size:12.5px; opacity:.8; margin-top:2px; font-weight:300;}
.brand .lock{background:rgba(255,255,255,.12); border:none; border-radius:50%; width:36px; height:36px; color:#fff; font-size:15px;}
.fb-status{display:flex; align-items:center; gap:5px; font-size:11px; opacity:.85; margin-top:6px; position:relative; z-index:1;}
.fb-dot{width:8px; height:8px; border-radius:50%; background:#aaa; flex-shrink:0; transition:background .4s;}
.fb-dot.ok{background:#4caf7d;}
.fb-dot.err{background:#e05a4b;}
.fb-dot.warn{background:#e8a33d;}
.countdown{margin-top:16px; position:relative; z-index:1; display:flex; gap:10px; align-items:flex-end;}
.countdown .num{background:var(--mustard); color:var(--blue-dark); font-family:'Frank Ruhl Libre',serif; font-weight:900; font-size:30px; border-radius:13px; padding:7px 14px; line-height:1;}
.countdown .lbl{font-size:11.5px; padding-bottom:8px; opacity:.85;}

nav.top-nav{display:none;}
main{flex:1; padding:18px 16px 90px;}
.section-title{font-family:'Frank Ruhl Libre',serif; font-weight:700; font-size:18px; color:var(--blue); margin:18px 0 10px; display:flex; align-items:center; gap:8px;}
.section-title:first-child{margin-top:0;}
.section-title::before{content:""; width:5px; height:17px; background:var(--mustard); border-radius:3px; display:inline-block;}

.card{background:var(--card); border-radius:16px; padding:14px 16px; margin-bottom:10px; box-shadow:0 2px 10px rgba(27,75,111,.07); border:1px solid rgba(27,75,111,.06);}

nav.bottom{position:sticky; bottom:0; background:var(--card); border-top:1px solid rgba(27,75,111,.1); display:flex; justify-content:space-around; padding:7px 2px 9px; box-shadow:0 -4px 16px rgba(27,75,111,.08); z-index:50;}
nav.bottom .nitem{display:flex; flex-direction:column; align-items:center; gap:2px; font-size:9.5px; color:#9aa6ad; width:44px; background:none; border:none; padding:4px 0;}
nav.bottom .nitem.active{color:var(--blue); font-weight:700;}
nav.bottom .nitem .ic{font-size:18px;}

/* more-sheet for mobile */
#more-sheet{display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:100;}
#more-sheet .sheet{position:absolute; bottom:0; left:0; right:0; background:var(--cream); border-radius:20px 20px 0 0; padding:18px; max-width:1100px; margin:0 auto;}
#more-sheet .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:10px;}
#more-sheet .opt{background:var(--card); border-radius:14px; padding:14px 6px; text-align:center; font-size:11.5px; font-weight:600; color:var(--blue-dark); border:none;}
#more-sheet .opt .ic{font-size:22px; display:block; margin-bottom:6px;}
#more-sheet .close{display:block; width:100%; text-align:center; padding:10px; margin-top:14px; background:none; border:none; color:#999; font-size:13px;}

@media (min-width:760px){
  .app{border-radius:22px; margin:20px auto; overflow:hidden; min-height:auto; box-shadow:0 0 60px rgba(27,75,111,.1);}
  header.top{padding:24px 36px 20px;}
  nav.bottom{display:none;}
  #more-sheet{display:none !important;}
  nav.top-nav{display:flex; gap:4px; background:var(--blue-dark); padding:0 28px; overflow-x:auto;}
  nav.top-nav .nitem{color:rgba(255,255,255,.6); font-size:12.5px; padding:12px 13px; display:flex; align-items:center; gap:5px; border-bottom:3px solid transparent; cursor:pointer; white-space:nowrap; background:none; border-top:none; border-right:none; border-left:none;}
  nav.top-nav .nitem.active{color:#fff; border-bottom:3px solid var(--mustard); font-weight:600;}
  main{padding:24px 36px 40px;}
}

/* ===== generic form bits ===== */
.row{display:flex; gap:8px; margin-bottom:8px; align-items:center;}
.row input[type=text], .row input[type=time], .row input[type=tel], .row select, textarea{
  flex:1; padding:10px 12px; border:1.5px solid #e3e0d4; border-radius:10px; font-size:13.5px; background:#fff;
}
textarea{width:100%; min-height:54px; resize:vertical;}
.btn{border:none; border-radius:10px; padding:9px 14px; font-size:13px; font-weight:600; color:#fff;}
.btn-add{background:var(--cypress);}
.btn-del{background:transparent; color:var(--terracotta); font-size:17px; padding:4px 8px;}
.btn-save{background:var(--blue);}
.pill{display:inline-block; background:var(--cream); border:1.5px solid var(--cypress); color:var(--cypress); font-size:11.5px; font-weight:600; border-radius:18px; padding:5px 11px; margin:3px 4px 3px 0;}
.tag{font-size:10.5px; font-weight:700; color:#fff; border-radius:8px; padding:3px 8px; white-space:nowrap; display:inline-block; margin-left:6px;}
.tag.morning{background:var(--cypress);} .tag.noon{background:var(--mustard); color:var(--blue-dark);} .tag.evening{background:var(--blue);}
.checkrow{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid #f0ede0;}
.checkrow:last-child{border-bottom:none;}
.checkrow input[type=checkbox]{width:19px; height:19px; accent-color:var(--cypress); flex-shrink:0;}
.checkrow.done span.txt{text-decoration:line-through; color:#aaa;}
.checkrow span.txt{flex:1; font-size:13.5px;}
.small-btn{background:none; border:none; color:var(--blue); font-size:12.5px; font-weight:600; padding:6px 0;}
.muted{color:#999; font-size:12px;}
.day-card{border-inline-start:5px solid var(--mustard);}
.day-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
.day-head input{border:none; background:none; font-family:'Frank Ruhl Libre',serif; font-weight:700; font-size:15.5px; color:var(--blue); flex:1;}
.block-label{font-size:11px; font-weight:700; color:#888; margin:8px 0 3px;}
.note-card{display:flex; gap:10px;}
.avatar{width:34px; height:34px; border-radius:50%; background:var(--cypress); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; font-size:12px;}
.who{font-weight:700; font-size:12.5px; color:var(--blue-dark);}
.txt2{font-size:13px; color:#444; margin-top:2px; white-space:pre-wrap;}
.time2{font-size:10.5px; color:#aaa; margin-top:3px;}
.info-box{background:#fff; border-radius:14px; padding:14px; margin-bottom:10px; border-inline-start:4px solid var(--cypress); font-size:13px; line-height:1.7;}
.info-box b{color:var(--blue-dark);}
.warn-box{background:#fff8ec; border-inline-start:4px solid var(--mustard); border-radius:14px; padding:12px 14px; margin-bottom:10px; font-size:12.5px; color:#7a5a17;}
.fam-select{display:flex; gap:6px; overflow-x:auto; margin-bottom:12px; padding-bottom:4px;}
.fam-select button{flex-shrink:0; background:#fff; border:1.5px solid #ddd; border-radius:14px; padding:8px 13px; font-size:12px; font-weight:600; color:#777;}
.fam-select button.active{background:var(--blue); color:#fff; border-color:var(--blue);}
a.link{color:var(--blue); font-weight:600;}
.empty-hint{text-align:center; color:#bbb; font-size:12.5px; padding:18px 0;}
footer.appfoot{text-align:center; font-size:10.5px; color:#bbb; padding:10px;}
#save-toast{
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
  background:var(--cypress); color:#fff; padding:8px 20px;
  border-radius:20px; font-size:13px; font-weight:600; z-index:300;
  opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap;
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login-screen">
  <div class="login-box">
    <h1>משפחת אנגל — טיול לאומבריה</h1>
    <div style="font-size:12px;color:#999;margin-bottom:6px;">קיץ תשפ"ו</div>
    <p>הזינו את קוד הגישה המשפחתי</p>
    <input id="code-input" type="text" inputmode="numeric" maxlength="6" placeholder="••••">
    <button onclick="tryLogin()">כניסה</button>
    <div class="login-error" id="login-err"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <div class="app">
    <header class="top">
      <div class="brand">
        <div>
          <h1>משפחת אנגל — טיול לאומבריה</h1>
          <div class="sub">קיץ תשפ"ו · 29.7–5.8.2026 · אומבריה, איטליה</div>
        </div>
        <button class="lock" title="נעילה" onclick="logout()">🔒</button>
      </div>
      <div class="countdown">
        <div class="num" id="countdown-num">--</div>
        <div class="lbl">ימים<br>לטיסה</div>
      </div>
      <div class="fb-status">
        <span class="fb-dot" id="fb-dot"></span>
        <span id="fb-status-text">בודק חיבור…</span>
      </div>
    </header>

    <nav class="top-nav" id="top-nav"></nav>
    <div class="tile-strip"></div>

    <main id="main-content"></main>

    <footer class="appfoot">לה פאמיליה באיטליה · קוד גישה משפחתי בלבד</footer>

    <nav class="bottom" id="bottom-nav"></nav>
  </div>
</div>

<div id="save-toast">נשמר ✓</div>

<div id="more-sheet">
  <div class="sheet">
    <div class="section-title" style="margin:0 0 4px">עוד טאבים</div>
    <div class="grid" id="more-grid"></div>
    <button class="close" onclick="closeMore()">סגירה</button>
  </div>
</div>

<script>
const ACCESS_CODE = "1309";

const TABS = [
  {id:"home", ic:"🏠", label:"בית"},
  {id:"itinerary", ic:"🗓️", label:"מסלול"},
  {id:"places", ic:"📍", label:"מקומות"},
  {id:"stay", ic:"✈️", label:"לינה וטיסות"},
  {id:"kosher", ic:"🍽️", label:"כשרות ושבת"},
  {id:"villa-kosher", ic:"🏡", label:"כשרות ליד הווילה"},
  {id:"villa-attractions", ic:"🏛️", label:"אטרקציות"},
  {id:"packing", ic:"🎒", label:"אריזה"},
  {id:"tasks", ic:"✅", label:"מטלות"},
  {id:"preflight", ic:"🧳", label:"הכנות לטיסה"},
  {id:"contacts", ic:"📞", label:"אנשי קשר"},
  {id:"board", ic:"📋", label:"לוח מודעות"},
];
const MOBILE_PRIMARY = ["home","itinerary","packing","contacts","kosher"];

const FAMILIES = ["שלמה ונאוה אנגל","אלעד ועדי לוביץ'","נצר ונעמה משאלי","דניאל ומוריה אנגל","הלל אנגל"];

const TRIP_START = new Date(2026,6,29); // Jul 29 2026
const TRIP_END = new Date(2026,7,5); // Aug 5 2026

let currentTab = "home";
let cache = {};

/* ---------- storage helpers (Firebase Realtime Database + localStorage cache) ---------- */
const FIREBASE_URL = "https://engel-italy-trip-default-rtdb.firebaseio.com";
const LS_PREFIX = 'trip-';

async function loadKey(key, fallback){
  try{
    const res = await fetch(`${FIREBASE_URL}/${encodeURIComponent(key)}.json`);
    if(!res.ok) throw new Error('bad response');
    const data = await res.json();
    if(data === null || data === undefined){
      const cached = localStorage.getItem(LS_PREFIX + key);
      if(cached){ try{ return JSON.parse(cached); }catch(e){} }
      return fallback;
    }
    localStorage.setItem(LS_PREFIX + key, JSON.stringify(data));
    return data;
  }catch(e){
    console.error("load fail", key, e);
    const cached = localStorage.getItem(LS_PREFIX + key);
    if(cached){ try{ setFbStatus(false, true); return JSON.parse(cached); }catch(e2){} }
    return fallback;
  }
}
async function saveKey(key, value){
  localStorage.setItem(LS_PREFIX + key, JSON.stringify(value));
  try{
    await fetch(`${FIREBASE_URL}/${encodeURIComponent(key)}.json`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(value)
    });
    setFbStatus(true);
    showSaveToast();
  }catch(e){ console.error("save fail", key, e); setFbStatus(false); }
}

function setFbStatus(ok, offline=false){
  const dot = document.getElementById('fb-dot');
  const txt = document.getElementById('fb-status-text');
  if(!dot) return;
  if(offline){
    dot.className = 'fb-dot warn';
    txt.textContent = 'מציג נתונים שמורים — לא מחובר';
  } else {
    dot.className = 'fb-dot ' + (ok ? 'ok' : 'err');
    txt.textContent = ok ? 'מחובר ✓' : 'שמירה נכשלה — בדקו חיבור';
  }
}

async function checkFbConnection(){
  try{
    const res = await fetch(`${FIREBASE_URL}/.json?shallow=true`, {signal: AbortSignal.timeout(5000)});
    setFbStatus(res.ok);
  }catch(e){ setFbStatus(false); }
}

function showSaveToast(){
  const toast = document.getElementById('save-toast');
  if(!toast) return;
  toast.style.opacity = '1';
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>{ toast.style.opacity='0'; }, 1800);
}

function openWazeToVilla(){
  const address = encodeURIComponent('Strada Vallefigliola, Otricoli, Umbria, Italy');
  window.open(`https://waze.com/ul?q=${address}&navigate=yes`, '_blank');
}
function uid(){ return Math.random().toString(36).slice(2,9); }

/* ---------- auth ---------- */
function tryLogin(){
  const v = document.getElementById('code-input').value.trim();
  if(v === ACCESS_CODE){
    localStorage.setItem('trip-auth','1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    boot();
  } else {
    document.getElementById('login-err').textContent = 'קוד שגוי, נסו שוב';
  }
}
document.getElementById('code-input').addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });
function logout(){
  if(!confirm('לצאת מהאפליקציה?')) return;
  localStorage.removeItem('trip-auth');
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('code-input').value='';
}

/* ---------- nav rendering ---------- */
function buildNav(){
  const topNav = document.getElementById('top-nav');
  topNav.innerHTML = TABS.map(t=>`<button class="nitem ${t.id===currentTab?'active':''}" onclick="switchTab('${t.id}')">${t.ic} ${t.label}</button>`).join('');

  const bottomNav = document.getElementById('bottom-nav');
  let html = MOBILE_PRIMARY.map(id=>{
    const t = TABS.find(x=>x.id===id);
    return `<button class="nitem ${t.id===currentTab?'active':''}" onclick="switchTab('${t.id}')"><span class="ic">${t.ic}</span>${t.label}</button>`;
  }).join('');
  const isMoreActive = !MOBILE_PRIMARY.includes(currentTab);
  html += `<button class="nitem ${isMoreActive?'active':''}" onclick="openMore()"><span class="ic">⋯</span>עוד</button>`;
  bottomNav.innerHTML = html;
}
function openMore(){
  const grid = document.getElementById('more-grid');
  const others = TABS.filter(t=>!MOBILE_PRIMARY.includes(t.id));
  grid.innerHTML = others.map(t=>`<button class="opt" onclick="switchTab('${t.id}'); closeMore();"><span class="ic">${t.ic}</span>${t.label}</button>`).join('');
  document.getElementById('more-sheet').style.display='block';
}
function closeMore(){ document.getElementById('more-sheet').style.display='none'; }

async function switchTab(id){
  currentTab = id;
  buildNav();
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="empty-hint">טוען…</div>';
  const renderer = RENDERERS[id];
  await renderer();
}

/* ---------- boot ---------- */
function updateCountdown(){
  const now = new Date();
  const diff = Math.ceil((TRIP_START - now) / (1000*60*60*24));
  document.getElementById('countdown-num').textContent = diff > 0 ? diff : (diff===0?'🎉':'בדרך');
}

async function boot(){
  updateCountdown();
  checkFbConnection();
  setInterval(checkFbConnection, 30000);
  await switchTab('home');
}

/* =================================================================
   HOME
================================================================= */
RENDERERS = {};
RENDERERS.home = async function(){
  const board = await loadKey('board', []);
  const last2 = board.slice(-2).reverse();
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="section-title">⭐ גישה מהירה</div>
    <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:6px;">
      ${[["itinerary","🗓️","מסלול"],["kosher","🍽️","כשרות"],["packing","🎒","אריזה"],["contacts","📞","קשר"]].map(([id,ic,lbl])=>
        `<button class="card" style="text-align:center; border:none;" onclick="switchTab('${id}')"><div style="font-size:24px">${ic}</div><div style="font-size:11.5px; font-weight:600; color:var(--blue-dark); margin-top:4px;">${lbl}</div></button>`
      ).join('')}
    </div>

    <div class="section-title">👨‍👩‍👧‍👦 מי בטיול</div>
    <div class="card">${FAMILIES.map(f=>`<span class="pill">${f}</span>`).join('')}</div>

    <div class="section-title">📋 עדכונים אחרונים</div>
    ${last2.length? last2.map(n=>`
      <div class="card note-card">
        <div class="avatar">${n.author.slice(0,2)}</div>
        <div><div class="who">${n.author}</div><div class="txt2">${escapeHtml(n.text)}</div><div class="time2">${n.time}</div></div>
      </div>`).join('') : '<div class="card empty-hint">אין עדיין הודעות — הוסיפו אחת בלוח המודעות</div>'}
    <button class="small-btn" onclick="switchTab('board')">← לכל הלוח</button>

    <div class="section-title">💾 גיבוי נתונים</div>
    <div class="card" style="display:flex; gap:10px;">
      <button class="btn btn-save" style="flex:1" onclick="exportData()">⬇️ ייצוא JSON</button>
      <button class="btn" style="flex:1; background:var(--mustard); color:var(--blue-dark);" onclick="triggerImport()">⬆️ ייבוא JSON</button>
    </div>
    <p class="muted" style="margin-top:4px">שמרו עותק של כל הנתונים כקובץ או העלו גיבוי קיים.</p>
  `;
};

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function exportData(){
  const keys = ['board','itinerary-days','places','stay-flights','kosher-spots','synagogues','packing-shared','packing-personal','tasks','preflight','contacts','villa-attractions-custom'];
  const out = {};
  for(const k of keys){
    const v = await loadKey(k, null);
    if(v !== null) out[k] = v;
  }
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='italy-trip-backup.json'; a.click();
  URL.revokeObjectURL(url);
}
function triggerImport(){
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='.json';
  inp.onchange = async e => {
    const f = e.target.files[0]; if(!f) return;
    try{
      const data = JSON.parse(await f.text());
      for(const [key, value] of Object.entries(data)) await saveKey(key, value);
      await switchTab(currentTab);
    }catch(e2){ alert('קובץ לא תקין — ודאו שזה קובץ גיבוי מהאפליקציה'); }
  };
  inp.click();
}

function renderCustomAttractions(items){
  const el = document.getElementById('custom-attractions-list');
  if(!el) return;
  if(!items.length){
    el.innerHTML = '<div class="card empty-hint" style="margin-bottom:10px;">עדיין לא הוספתם אטרקציות — השתמשו בטופס למטה להוסיף המלצות משלכם!</div>';
    return;
  }
  el.innerHTML = items.map(a => `
    <div class="card" style="border-inline-start:4px solid var(--blue); margin-bottom:10px; position:relative;">
      <button class="btn-del" onclick="delCustomAttraction('${a.id}')" style="position:absolute;top:10px;left:10px;">✕</button>
      <div style="padding-left:28px;">
        <b style="font-size:14px; color:var(--blue-dark);">${escapeHtml(a.name)}</b>
        ${a.dist ? `<span style="font-size:11px; color:#888; margin-right:8px;">${escapeHtml(a.dist)}</span>` : ''}
        ${a.desc ? `<div style="font-size:13px; color:#444; margin-top:5px; line-height:1.6;">${escapeHtml(a.desc)}</div>` : ''}
        <div class="muted" style="margin-top:6px;">
          ${a.duration ? `⏱ ${escapeHtml(a.duration)}` : ''}
          ${a.duration && (a.ages || a.price) ? ' · ' : ''}
          ${a.ages ? escapeHtml(a.ages) : ''}
          ${a.ages && a.price ? ' · ' : ''}
          ${a.price ? escapeHtml(a.price) : ''}
        </div>
      </div>
    </div>`).join('');
}

async function addCustomAttraction(){
  const name = document.getElementById('attr-name').value.trim();
  if(!name) return;
  const item = {
    id: uid(),
    name,
    dist:     document.getElementById('attr-dist').value.trim(),
    duration: document.getElementById('attr-duration').value.trim(),
    desc:     document.getElementById('attr-desc').value.trim(),
    ages:     document.getElementById('attr-ages').value.trim(),
    price:    document.getElementById('attr-price').value.trim(),
  };
  const list = await loadKey('villa-attractions-custom', []);
  list.push(item);
  await saveKey('villa-attractions-custom', list);
  ['attr-name','attr-dist','attr-duration','attr-desc','attr-ages','attr-price'].forEach(id => {
    document.getElementById(id).value = '';
  });
  renderCustomAttractions(list);
}

async function delCustomAttraction(id){
  let list = await loadKey('villa-attractions-custom', []);
  list = list.filter(a => a.id !== id);
  await saveKey('villa-attractions-custom', list);
  renderCustomAttractions(list);
}

function defaultSharedPacking(){
  return ["שקית כלים חד-פעמיים + סכו״ם", "נייר כסף ומגבונים לחים", "תרופות בסיסיות וערכת עזרה ראשונה", "מתאם חשמל לאיטליה", "סבון/אבקת כביסה קטנה", "כדורי אגירה / מטען נייד"]
    .map(t=>({id:uid(), text:t, done:false}));
}
function defaultPersonalPacking(){ return ["דרכון", "מטען טלפון", "כובע/משקפי שמש", "בגד ים", "תרופות אישיות"].map(t=>({id:uid(),text:t,done:false})); }

RENDERERS.packing = async function(){
  const shared = await loadKey('packing-shared', null) || defaultSharedPacking();
  if(!cache.packInit){ await saveKey('packing-shared', shared); cache.packInit=true; }
  const personalAll = await loadKey('packing-personal', {});
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="section-title">🎒 רשימה משותפת (למשפחה כולה)</div>
    <div class="card"><div id="shared-list"></div>
      <div class="row" style="margin-top:8px"><input type="text" id="shared-new" placeholder="הוספת פריט..."><button class="btn btn-add" onclick="addShared()">+</button></div>
    </div>

    <div class="section-title">🧍 רשימה אישית</div>
    <div class="fam-select" id="person-select"></div>
    <div class="card"><div id="personal-list"></div>
      <div class="row" style="margin-top:8px"><input type="text" id="personal-new" placeholder="הוספת פריט..."><button class="btn btn-add" onclick="addPersonal()">+</button></div>
    </div>
  `;
  renderCheckList('shared-list', shared, 'packing-shared');

  const sel = document.getElementById('person-select');
  if(!cache.currentPerson) cache.currentPerson = FAMILIES[0];
  sel.innerHTML = FAMILIES.map(f=>`<button class="${f===cache.currentPerson?'active':''}" onclick="selectPerson('${f.replace(/'/g,"\\'")}')">${f}</button>`).join('');
  renderPersonalList(personalAll);
};
function renderPersonalList(personalAll){
  const list = personalAll[cache.currentPerson] || defaultPersonalPacking();
  renderCheckList('personal-list', list, null, cache.currentPerson);
}
async function selectPerson(name){
  cache.currentPerson = name;
  await RENDERERS.packing();
}
function renderCheckList(elId, items, storageKey, personKey){
  const el = document.getElementById(elId);
  el.innerHTML = items.length ? items.map(it=>`
    <div class="checkrow ${it.done?'done':''}">
      <input type="checkbox" ${it.done?'checked':''} onchange="toggleCheck('${storageKey||'packing-personal'}','${it.id}', this.checked, ${personKey?`'${personKey.replace(/'/g,"\\'")}'`:'null'})">
      <span class="txt">${escapeHtml(it.text)}</span>
      <button class="btn-del" onclick="delCheck('${storageKey||'packing-personal'}','${it.id}', ${personKey?`'${personKey.replace(/'/g,"\\'")}'`:'null'})">✕</button>
    </div>`).join('') : '<div class="empty-hint">הרשימה ריקה</div>';
}
async function toggleCheck(storageKey, id, checked, personKey){
  if(storageKey==='packing-personal'){
    const all = await loadKey('packing-personal', {});
    const list = all[personKey] || defaultPersonalPacking();
    const it = list.find(x=>x.id===id); if(it) it.done = checked;
    all[personKey] = list; await saveKey('packing-personal', all);
  } else {
    const list = await loadKey(storageKey, []);
    const it = list.find(x=>x.id===id); if(it) it.done = checked;
    await saveKey(storageKey, list);
  }
}
async function delCheck(storageKey, id, personKey){
  if(storageKey==='packing-personal'){
    const all = await loadKey('packing-personal', {});
    let list = all[personKey] || [];
    list = list.filter(x=>x.id!==id);
    all[personKey]=list; await saveKey('packing-personal', all);
    renderPersonalList(all);
  } else {
    let list = await loadKey(storageKey, []);
    list = list.filter(x=>x.id!==id);
    await saveKey(storageKey, list);
    if(storageKey==='packing-shared') renderCheckList('shared-list', list, 'packing-shared');
    if(storageKey==='tasks') RENDERERS.tasks();
  }
}
async function addShared(){
  const v = document.getElementById('shared-new').value.trim(); if(!v) return;
  const list = await loadKey('packing-shared', []);
  list.push({id:uid(), text:v, done:false});
  await saveKey('packing-shared', list);
  document.getElementById('shared-new').value='';
  renderCheckList('shared-list', list, 'packing-shared');
}
async function addPersonal(){
  const v = document.getElementById('personal-new').value.trim(); if(!v) return;
  const all = await loadKey('packing-personal', {});
  const list = all[cache.currentPerson] || defaultPersonalPacking();
  list.push({id:uid(), text:v, done:false});
  all[cache.currentPerson]=list;
  await saveKey('packing-personal', all);
  document.getElementById('personal-new').value='';
  renderPersonalList(all);
}

function renderTasksList(tasks){

        <span class="txt">${escapeHtml(t.text)}</span>

async function addTask(){
  const text = document.getElementById('task-text').value.trim(); if(!text) return;
  const owner = document.getElementById('task-owner').value;
  const tasks = await loadKey('tasks', []);
  tasks.push({id:uid(), text, owner, done:false});
  await saveKey('tasks', tasks);
  RENDERERS.tasks();
}
async function toggleTask(id, checked){
  const tasks = await loadKey('tasks', []);
  const t = tasks.find(x=>x.id===id); if(t) t.done = checked;
  await saveKey('tasks', tasks);
}

  main.innerHTML = `
    <div class="section-title">🧳 הכנות לפני הטיסה</div>
    <p class="muted" style="margin-bottom:8px">צ'ק-ליסט נפרד לכל משפחה גרעינית</p>
    <div class="fam-select" id="pf-select"></div>
    <div class="card"><div id="pf-list"></div>
      <div class="row" style="margin-top:8px"><input type="text" id="pf-new" placeholder="הוספת פריט..."><button class="btn btn-add" onclick="addPF()">+</button></div>
    </div>
  `;
  document.getElementById('pf-select').innerHTML = FAMILIES.map(f=>`<button class="${f===cache.currentPFFamily?'active':''}" onclick="selectPF('${f.replace(/'/g,"\\'")}')">${f}</button>`).join('');
  renderPFList(all);
};
function renderPFList(all){
  const list = all[cache.currentPFFamily] || defaultPreflightItems();
  renderCheckList('pf-list', list, null, '__PF__'+cache.currentPFFamily);
}
async function selectPF(name){ cache.currentPFFamily = name; const all = await loadKey('preflight', {}); renderPFList(all); document.getElementById('pf-select').innerHTML = FAMILIES.map(f=>`<button class="${f===cache.currentPFFamily?'active':''}" onclick="selectPF('${f.replace(/'/g,"\\'")}')">${f}</button>`).join(''); }
async function addPF(){
  const v = document.getElementById('pf-new').value.trim(); if(!v) return;
  const all = await loadKey('preflight', {});
  const list = all[cache.currentPFFamily] || defaultPreflightItems();
  list.push({id:uid(), text:v, done:false});
  all[cache.currentPFFamily]=list;
  await saveKey('preflight', all);
  document.getElementById('pf-new').value='';
  renderPFList(all);
}
// override toggle/del for PF (personKey prefixed with __PF__)
const _origToggleCheck = toggleCheck;
toggleCheck = async function(storageKey, id, checked, personKey){
  if(personKey && personKey.startsWith('__PF__')){
    const fam = personKey.replace('__PF__','');
    const all = await loadKey('preflight', {});
    const list = all[fam] || [];
    const it = list.find(x=>x.id===id); if(it) it.done = checked;
    all[fam]=list; await saveKey('preflight', all);
    return;
  }
  return _origToggleCheck(storageKey, id, checked, personKey);
};
const _origDelCheck = delCheck;
delCheck = async function(storageKey, id, personKey){
  if(personKey && personKey.startsWith('__PF__')){
    const fam = personKey.replace('__PF__','');
    const all = await loadKey('preflight', {});
    let list = all[fam] || [];
    list = list.filter(x=>x.id!==id);
    all[fam]=list; await saveKey('preflight', all);
    renderPFList(all);
    return;
  }
  return _origDelCheck(storageKey, id, personKey);
};

RENDERERS.contacts = async function(){
  const contacts = await loadKey('contacts', null) || defaultContacts();

  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="section-title">📞 אנשי קשר חשובים</div>
    <div id="contacts-list"></div>
    <div class="card">
      <div class="row"><input type="text" id="c-name" placeholder="שם..."></div>
      <div class="row"><input type="text" id="c-phone" placeholder="טלפון..."></div>
      <div class="row"><input type="text" id="c-note" placeholder="הערה..."><button class="btn btn-add" onclick="addContact()">הוספה</button></div>
    </div>

  renderContactsList(contacts);
};
function renderContactsList(contacts){
  document.getElementById('contacts-list').innerHTML = contacts.map(c=>`
    <div class="card" style="display:flex; justify-content:space-between; align-items:flex-start;">
      <div><b>${escapeHtml(c.name)}</b><div style="margin-top:3px; font-size:13px;">${escapeHtml(c.phone)}</div>${c.note?`<div class="muted" style="margin-top:2px">${escapeHtml(c.note)}</div>`:''}</div>
      <button class="btn-del" onclick="delContact('${c.id}')">✕</button>
    </div>`).join('');
}
async function addContact(){
  const name = document.getElementById('c-name').value.trim();
  const phone = document.getElementById('c-phone').value.trim();
  const note = document.getElementById('c-note').value.trim();
  if(!name) return;
  const contacts = await loadKey('contacts', []);
  contacts.push({id:uid(), name, phone, note});
  await saveKey('contacts', contacts);
  RENDERERS.contacts();
}
async function delContact(id){
  let contacts = await loadKey('contacts', []);
  contacts = contacts.filter(c=>c.id!==id);
  await saveKey('contacts', contacts);
  RENDERERS.contacts();
}

   BOARD
================================================================= */
RENDERERS.board = async function(){
  const board = await loadKey('board', []);
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="section-title">📋 לוח מודעות</div>
    <div class="card">
      <div class="row"><select id="b-author"><option value="">מי כותב? (שם)</option>${FAMILIES.map(f=>`<option>${f}</option>`).join('')}</select></div>
      <div class="row"><textarea id="b-text" placeholder="כתבו הודעה לכל המשפחה..."></textarea></div>
      <button class="btn btn-add" style="width:100%" onclick="addBoard()">פרסום הודעה</button>
    </div>
    <div id="board-list"></div>
  `;
  renderBoardList(board);
};
function renderBoardList(board){
  const el = document.getElementById('board-list');
  const rev = [...board].reverse();
  el.innerHTML = rev.length ? rev.map(n=>`
    <div class="card note-card">
      <div class="avatar">${(n.author||'?').slice(0,2)}</div>
      <div style="flex:1"><div class="who">${escapeHtml(n.author||'אנונימי')}</div><div class="txt2">${escapeHtml(n.text)}</div><div class="time2">${n.time}</div></div>
      <button class="btn-del" onclick="delBoard('${n.id}')">✕</button>
    </div>`).join('') : '<div class="card empty-hint">עדיין אין הודעות — היו הראשונים לכתוב!</div>';
}
async function addBoard(){
  const author = document.getElementById('b-author').value || 'המשפחה';
  const text = document.getElementById('b-text').value.trim();
  if(!text) return;
  const board = await loadKey('board', []);
  board.push({id:uid(), author, text, time: new Date().toLocaleString('he-IL',{dateStyle:'short',timeStyle:'short'})});
  await saveKey('board', board);
  RENDERERS.board();
}
async function delBoard(id){
  let board = await loadKey('board', []);
  board = board.filter(n=>n.id!==id);
  await saveKey('board', board);
  RENDERERS.board();
}
