<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#15607F" id="meta-theme-color">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="אנגל באומבריה">
<meta name="description" content="אפליקציית הטיול המשפחתי של משפחת אנגל לאומבריה, קיץ תשפ״ו">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">

<title>משפחת אנגל — טיול לאומבריה · קיץ תשפ"ו</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Heebo:wght@300;400;500;600;700;800&display=swap');

/* ============================================================
   DESIGN TOKENS — light (default) + dark
============================================================ */
:root{
  --bg:#EDF0F4; --surface:#FFFFFF; --surface-2:#F5F8FB; --surface-3:#EAF0F6;
  --text:#15212E; --text-soft:#5C6B7A; --text-mute:#94A2B0;
  --border:#E2E9F0; --border-soft:#EEF2F7;
  --brand:#15607F; --brand-2:#1E86AE; --brand-ink:#0B3A4E; --on-brand:#FFFFFF;
  --accent:#F2A93B; --accent-ink:#6A4A12;
  --terra:#D9654B; --green:#3D9B6C; --danger:#E0524E;
  --ring:rgba(30,134,174,.35);
  --shadow-sm:0 1px 3px rgba(20,40,60,.06);
  --shadow:0 6px 22px rgba(20,40,60,.09);
  --shadow-lg:0 18px 48px rgba(20,40,60,.18);
  --r-sm:10px; --r:14px; --r-lg:20px; --r-xl:26px;
  --header-grad:linear-gradient(135deg,#15607F 0%,#1E86AE 100%);
  --sp:16px;
  color-scheme:light;
}
[data-theme="dark"]{
  --bg:#0E141B; --surface:#161F29; --surface-2:#1C2632; --surface-3:#243140;
  --text:#E8EEF3; --text-soft:#A3B1BE; --text-mute:#6C7B89;
  --border:#27333F; --border-soft:#1F2A35;
  --brand:#2E97C2; --brand-2:#3AAAD6; --brand-ink:#CDE9F4; --on-brand:#07222E;
  --accent:#F2B153; --accent-ink:#3D2800;
  --terra:#E87A61; --green:#46B07E; --danger:#EA6360;
  --ring:rgba(58,170,214,.42);
  --shadow-sm:0 1px 3px rgba(0,0,0,.4);
  --shadow:0 6px 22px rgba(0,0,0,.45);
  --shadow-lg:0 18px 48px rgba(0,0,0,.6);
  --header-grad:linear-gradient(135deg,#11475E 0%,#1C6E8F 100%);
  color-scheme:dark;
}

/* ============================================================
   BASE
============================================================ */
*{box-sizing:border-box; margin:0; padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:'Heebo',sans-serif; background:var(--bg); color:var(--text);
  min-height:100vh; line-height:1.55; -webkit-font-smoothing:antialiased;
  transition:background .3s, color .3s;
}
button{font-family:inherit; cursor:pointer; color:inherit;}
input,textarea,select{font-family:inherit; color:inherit;}
a{color:var(--brand); text-decoration:none;}
::selection{background:var(--accent); color:var(--accent-ink);}
:focus-visible{outline:3px solid var(--ring); outline-offset:2px; border-radius:6px;}
button:focus:not(:focus-visible){outline:none;}

/* slim scrollbars */
*::-webkit-scrollbar{width:9px; height:9px;}
*::-webkit-scrollbar-thumb{background:var(--text-mute); border-radius:20px; border:2px solid transparent; background-clip:content-box;}
*::-webkit-scrollbar-track{background:transparent;}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms !important; transition-duration:.001ms !important;}
}

/* ============================================================
   LOGIN
============================================================ */
#login-screen{
  min-height:100vh; min-height:100dvh; display:flex; align-items:center; justify-content:center;
  background:radial-gradient(circle at 15% 10%, rgba(242,169,59,.22), transparent 45%), var(--header-grad);
  padding:22px;
}
.login-box{
  background:var(--surface); border-radius:var(--r-xl); padding:38px 30px; max-width:390px; width:100%;
  text-align:center; box-shadow:var(--shadow-lg); border:1px solid var(--border-soft);
  animation:pop .4s cubic-bezier(.2,.8,.2,1);
}
@keyframes pop{from{opacity:0; transform:translateY(14px) scale(.97);} to{opacity:1; transform:none;}}
.login-logo{width:62px; height:62px; border-radius:18px; margin:0 auto 14px; background:var(--header-grad);
  display:flex; align-items:center; justify-content:center; font-size:30px; box-shadow:var(--shadow);}
.login-box h1{font-family:'Frank Ruhl Libre',serif; font-weight:900; font-size:23px; color:var(--brand); margin-bottom:4px;}
.login-box .yr{font-size:12px; color:var(--text-mute); margin-bottom:6px;}
.login-box p{font-size:13px; color:var(--text-soft); margin-bottom:22px;}
.login-box input{
  width:100%; padding:15px; border-radius:var(--r); border:2px solid var(--border); font-size:22px;
  text-align:center; letter-spacing:8px; margin-bottom:14px; background:var(--surface-2); color:var(--text);
  transition:border-color .2s;
}
.login-box input:focus{outline:none; border-color:var(--brand);}
.login-box button{
  width:100%; padding:14px; border:none; border-radius:var(--r); background:var(--header-grad);
  color:#fff; font-weight:700; font-size:15px; box-shadow:var(--shadow); transition:transform .12s, filter .15s;
}
.login-box button:active{transform:scale(.98);}
.login-error{color:var(--danger); font-size:12.5px; min-height:18px; margin-top:10px; font-weight:600;}

/* ============================================================
   APP SHELL  (desktop = right sidebar · mobile = topbar + bottom nav)
============================================================ */
#app{display:none;}
.app-shell{display:flex; min-height:100vh; min-height:100dvh; max-width:1320px; margin:0 auto; background:var(--bg);}

/* --- sidebar (desktop) --- */
.sidebar{display:none;}
.brand-mark{width:40px; height:40px; border-radius:12px; background:var(--header-grad); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:21px; box-shadow:var(--shadow-sm);}
.cd-chip{display:flex; align-items:center; gap:10px; background:var(--surface-3); border-radius:var(--r);
  padding:10px 13px; border:1px solid var(--border-soft);}
.cd-chip .cd-num{font-family:'Frank Ruhl Libre',serif; font-weight:900; font-size:26px; line-height:1; color:var(--brand);}
.cd-chip .cd-meta{font-size:11px; color:var(--text-soft); font-weight:600; line-height:1.35;}
.fb-status{display:flex; align-items:center; gap:7px; font-size:11px; color:var(--text-soft);}
.fb-dot{width:9px; height:9px; border-radius:50%; background:var(--text-mute); flex-shrink:0; transition:background .4s; box-shadow:0 0 0 0 currentColor;}
.fb-dot.ok{background:var(--green);} .fb-dot.err{background:var(--danger);} .fb-dot.warn{background:var(--accent);}

/* --- main column --- */
.main-col{flex:1; min-width:0; display:flex; flex-direction:column; min-height:100vh; min-height:100dvh;}

/* --- mobile topbar --- */
.topbar{position:sticky; top:0; z-index:45; background:var(--header-grad); color:#fff;
  padding:max(10px,env(safe-area-inset-top)) 16px 11px; display:flex; align-items:center; gap:10px;
  box-shadow:var(--shadow-sm);}
.topbar .tb-brand{display:flex; align-items:center; gap:9px; min-width:0;}
.topbar .tb-title{font-family:'Frank Ruhl Libre',serif; font-weight:700; font-size:15.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.topbar .tb-mark{width:32px; height:32px; border-radius:9px; background:rgba(255,255,255,.16); display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0;}
.topbar .tb-cd{margin-inline-start:auto; background:rgba(255,255,255,.16); border-radius:11px; padding:4px 10px; font-size:12px; font-weight:700; white-space:nowrap;}
.icon-btn{background:rgba(255,255,255,.14); border:none; border-radius:11px; width:38px; height:38px; color:#fff;
  font-size:16px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .15s, transform .1s;}
.icon-btn:active{transform:scale(.92);}
.topbar .fb-status{color:rgba(255,255,255,.92);}

main{flex:1; padding:18px 16px calc(96px + env(safe-area-inset-bottom));}
footer.appfoot{text-align:center; font-size:10.5px; color:var(--text-mute); padding:14px;}

/* --- bottom nav (mobile) --- */
.bottom-nav{position:fixed; bottom:0; left:0; right:0; z-index:50; background:var(--surface);
  border-top:1px solid var(--border); display:flex; justify-content:space-around;
  padding:7px 4px calc(8px + env(safe-area-inset-bottom)); box-shadow:0 -6px 22px rgba(20,40,60,.08); max-width:1320px; margin:0 auto;}
.bottom-nav .nitem{display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10px; font-weight:600;
  color:var(--text-mute); background:none; border:none; padding:5px 4px 4px; border-radius:12px; flex:1; transition:color .15s;}
.bottom-nav .nitem .ic{font-size:20px; line-height:1; transition:transform .18s;}
.bottom-nav .nitem.active{color:var(--brand);}
.bottom-nav .nitem.active .ic{transform:translateY(-2px) scale(1.08);}
.bottom-nav .nitem .dotmark{width:5px; height:5px; border-radius:50%; background:var(--brand); margin-top:1px; opacity:0; transition:opacity .15s;}
.bottom-nav .nitem.active .dotmark{opacity:1;}

/* --- desktop layout switch --- */
@media (min-width:920px){
  body{background:var(--bg);}
  .app-shell{box-shadow:none;}
  .topbar{display:none;}
  .bottom-nav{display:none;}
  .sidebar{display:flex; flex-direction:column; width:272px; flex-shrink:0; position:sticky; top:0;
    height:100vh; background:var(--surface); border-inline-start:1px solid var(--border); padding:20px 16px; gap:14px; overflow-y:auto;}
  .sidebar .sb-brand{display:flex; align-items:center; gap:11px;}
  .sidebar .sb-brand h1{font-family:'Frank Ruhl Libre',serif; font-weight:900; font-size:17px; color:var(--brand); line-height:1.2;}
  .sidebar .sb-brand .sub{font-size:10.5px; color:var(--text-mute);}
  .sb-search{display:flex; align-items:center; gap:8px; background:var(--surface-2); border:1px solid var(--border);
    border-radius:var(--r); padding:10px 12px; color:var(--text-soft); font-size:13px; font-weight:500; width:100%; transition:border-color .15s;}
  .sb-search:hover{border-color:var(--brand);}
  .sb-search kbd{margin-inline-start:auto; font-size:10px; background:var(--surface-3); border-radius:6px; padding:2px 6px; color:var(--text-mute);}
  .sb-nav{flex:1; display:flex; flex-direction:column; gap:3px; overflow-y:auto; margin:0 -4px; padding:0 4px;}
  .sb-group-label{font-size:10.5px; font-weight:700; letter-spacing:.4px; color:var(--text-mute); margin:12px 8px 4px; text-transform:uppercase;}
  .sb-nav .nitem{display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:12px; border:none; background:none;
    color:var(--text-soft); font-size:13.5px; font-weight:600; width:100%; text-align:start; transition:background .14s, color .14s;}
  .sb-nav .nitem .ic{font-size:18px; width:22px; text-align:center; flex-shrink:0;}
  .sb-nav .nitem:hover{background:var(--surface-2); color:var(--text);}
  .sb-nav .nitem.active{background:color-mix(in srgb, var(--brand) 14%, transparent); color:var(--brand);}
  .sb-foot{display:flex; align-items:center; gap:8px; padding-top:12px; border-top:1px solid var(--border-soft);}
  .sb-foot .icon-btn{background:var(--surface-2); color:var(--text-soft); border:1px solid var(--border);}
  .sb-foot .icon-btn:hover{color:var(--brand); border-color:var(--brand);}
  main{padding:30px 34px 48px; max-width:920px;}
  footer.appfoot{padding:18px;}
}
@media (min-width:1180px){ main{padding:34px 52px 56px;} }
</style>
<style>
/* ============================================================
   COMPONENTS
============================================================ */
.section-title{font-family:'Frank Ruhl Libre',serif; font-weight:700; font-size:19px; color:var(--text);
  margin:24px 0 12px; display:flex; align-items:center; gap:9px;}
.section-title:first-child{margin-top:0;}
.section-title::before{content:""; width:5px; height:19px; background:var(--accent); border-radius:3px; display:inline-block;}
.section-sub{font-size:12.5px; color:var(--text-soft); margin:-6px 0 12px;}

.card{background:var(--surface); border-radius:var(--r-lg); padding:16px 18px; margin-bottom:12px;
  box-shadow:var(--shadow); border:1px solid var(--border-soft); transition:box-shadow .2s, transform .2s;}
.page-enter{animation:fadeUp .32s cubic-bezier(.2,.8,.2,1);}
@keyframes fadeUp{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}

/* hero */
.hero{background:var(--header-grad); color:#fff; border-radius:var(--r-xl); padding:22px; margin-bottom:16px;
  position:relative; overflow:hidden; box-shadow:var(--shadow);}
.hero::after{content:""; position:absolute; inset:0; background:radial-gradient(circle at 88% -20%, rgba(242,169,59,.4), transparent 55%); pointer-events:none;}
.hero .h-row{position:relative; z-index:1;}
.hero h2{font-family:'Frank Ruhl Libre',serif; font-weight:900; font-size:22px; margin-bottom:3px;}
.hero .h-sub{font-size:12.5px; opacity:.9;}
.hero .h-count{display:flex; align-items:baseline; gap:10px; margin-top:16px;}
.hero .h-count .n{font-family:'Frank Ruhl Libre',serif; font-weight:900; font-size:46px; line-height:.9;
  background:var(--accent); color:var(--accent-ink); border-radius:16px; padding:8px 16px;}
.hero .h-count .l{font-size:13px; opacity:.92; font-weight:500;}

/* quick grid */
.quick-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:10px;}
.quick-grid .q{background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--r); padding:14px 6px;
  text-align:center; box-shadow:var(--shadow-sm); transition:transform .15s, box-shadow .2s; display:flex; flex-direction:column; align-items:center; gap:6px;}
.quick-grid .q:hover{transform:translateY(-2px); box-shadow:var(--shadow);}
.quick-grid .q .ic{font-size:25px;}
.quick-grid .q .lbl{font-size:11.5px; font-weight:600; color:var(--text-soft);}

/* forms */
.row{display:flex; gap:8px; margin-bottom:9px; align-items:center; flex-wrap:wrap;}
.field{flex:1; min-width:120px; padding:11px 13px; border:1.5px solid var(--border); border-radius:var(--r-sm);
  font-size:14px; background:var(--surface-2); color:var(--text); transition:border-color .15s, background .15s; width:100%;}
.field:focus{outline:none; border-color:var(--brand); background:var(--surface);}
input.field,select.field,textarea.field{width:100%;}
.row > input[type=text],.row > input[type=time],.row > input[type=tel],.row > input[type=search],.row > select,.row > textarea{
  flex:1; min-width:120px; padding:11px 13px; border:1.5px solid var(--border); border-radius:var(--r-sm);
  font-size:14px; background:var(--surface-2); color:var(--text); transition:border-color .15s, background .15s;}
.row input:focus,.row select:focus,.row textarea:focus{outline:none; border-color:var(--brand); background:var(--surface);}
textarea{width:100%; min-height:58px; resize:vertical; padding:11px 13px; border:1.5px solid var(--border);
  border-radius:var(--r-sm); font-size:14px; background:var(--surface-2); color:var(--text);}
textarea:focus{outline:none; border-color:var(--brand); background:var(--surface);}
::placeholder{color:var(--text-mute);}
label.lbl{font-size:11px; font-weight:700; color:var(--text-soft); margin-bottom:3px; display:block;}

/* buttons */
.btn{border:none; border-radius:var(--r-sm); padding:10px 15px; font-size:13.5px; font-weight:700; color:#fff;
  display:inline-flex; align-items:center; justify-content:center; gap:6px; transition:transform .1s, filter .15s, box-shadow .2s;}
.btn:active{transform:scale(.97);}
.btn-add{background:var(--green);}
.btn-save{background:var(--brand);}
.btn-accent{background:var(--accent); color:var(--accent-ink);}
.btn-nav{background:#1b8ef0;}
.btn-ghost{background:var(--surface-2); color:var(--text-soft); border:1.5px solid var(--border);}
.btn-ghost:hover{border-color:var(--brand); color:var(--brand);}
.btn-block{width:100%;}
.btn-del{background:transparent; color:var(--terra); font-size:16px; padding:5px 9px; border-radius:9px; border:none; line-height:1;}
.btn-del:hover{background:color-mix(in srgb, var(--terra) 12%, transparent);}
.btn-icon{background:var(--surface-2); border:1.5px solid var(--border); color:var(--text-soft); border-radius:9px;
  width:32px; height:32px; font-size:14px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0;}
.btn-icon:hover{border-color:var(--brand); color:var(--brand);}
.small-btn{background:none; border:none; color:var(--brand); font-size:12.5px; font-weight:700; padding:7px 2px;}
.small-btn:hover{text-decoration:underline;}

/* pills / tags / chips */
.pill{display:inline-flex; align-items:center; background:var(--surface-3); border:1.5px solid color-mix(in srgb,var(--green) 50%, transparent);
  color:var(--green); font-size:11.5px; font-weight:600; border-radius:18px; padding:5px 12px; margin:3px 4px 3px 0;}
.tag{font-size:10px; font-weight:700; color:#fff; border-radius:7px; padding:3px 8px; white-space:nowrap; display:inline-block;}
.tag.shared{background:var(--accent); color:var(--accent-ink);}
.chip-row{display:flex; flex-wrap:wrap; gap:6px;}
.fam-select{display:flex; gap:7px; overflow-x:auto; margin-bottom:13px; padding-bottom:4px; -webkit-overflow-scrolling:touch;}
.fam-select button{flex-shrink:0; background:var(--surface); border:1.5px solid var(--border); border-radius:16px;
  padding:8px 14px; font-size:12.5px; font-weight:600; color:var(--text-soft); transition:all .15s;}
.fam-select button.active{background:var(--brand); color:#fff; border-color:var(--brand);}

/* segmented control */
.segmented{display:flex; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r);
  padding:4px; gap:4px; margin-bottom:16px;}
.segmented button{flex:1; border:none; background:none; padding:10px 8px; border-radius:11px; font-size:13px;
  font-weight:700; color:var(--text-soft); transition:all .15s;}
.segmented button.active{background:var(--surface); color:var(--brand); box-shadow:var(--shadow-sm);}

/* checkrow */
.checkrow{display:flex; align-items:center; gap:11px; padding:10px 0; border-bottom:1px solid var(--border-soft);}
.checkrow:last-child{border-bottom:none;}
.checkrow input[type=checkbox]{width:20px; height:20px; accent-color:var(--green); flex-shrink:0; cursor:pointer;}
.checkrow.done .txt{text-decoration:line-through; color:var(--text-mute);}
.checkrow .txt{flex:1; font-size:14px;}
.edit-inline{flex:1; padding:7px 10px; border:1.5px solid var(--brand); border-radius:8px; font-size:14px; background:var(--surface); color:var(--text);}

/* progress */
.progress{height:9px; border-radius:20px; background:var(--surface-3); overflow:hidden; flex:1;}
.progress > i{display:block; height:100%; background:linear-gradient(90deg,var(--green),#5fc394); border-radius:20px; transition:width .4s cubic-bezier(.2,.8,.2,1);}
.progress-wrap{display:flex; align-items:center; gap:10px; margin:4px 0 10px;}
.progress-label{font-size:11.5px; font-weight:700; color:var(--text-soft); white-space:nowrap;}

/* info / warn boxes */
.info-box{background:var(--surface); border-radius:var(--r-lg); padding:15px 17px; margin-bottom:12px;
  border-inline-start:4px solid var(--green); font-size:13.5px; line-height:1.75; box-shadow:var(--shadow-sm); border:1px solid var(--border-soft);}
.info-box b{color:var(--text);}
.warn-box{background:color-mix(in srgb,var(--accent) 13%, var(--surface)); border-inline-start:4px solid var(--accent);
  border-radius:var(--r-lg); padding:13px 16px; margin-bottom:12px; font-size:12.5px; line-height:1.7; color:var(--text); border:1px solid var(--border-soft);}
.muted{color:var(--text-mute); font-size:12px;}
.empty-hint{text-align:center; color:var(--text-mute); font-size:13px; padding:22px 12px;}
.list-card{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
.list-card .lc-actions{display:flex; gap:4px; flex-shrink:0;}
a.link{color:var(--brand); font-weight:600;}

/* notes / board */
.note-card{display:flex; gap:11px; flex-wrap:wrap;}
.avatar{width:38px; height:38px; border-radius:12px; color:#fff; display:flex; align-items:center; justify-content:center;
  font-weight:800; flex-shrink:0; font-size:13px;}
.who{font-weight:700; font-size:13px; color:var(--text);}
.txt2{font-size:13.5px; color:var(--text-soft); margin-top:3px; white-space:pre-wrap; word-break:break-word;}
.time2{font-size:10.5px; color:var(--text-mute); margin-top:4px;}
.comments-section{width:100%; margin-top:8px; border-top:1px solid var(--border-soft); padding-top:9px;}
.comment-item{display:flex; align-items:flex-start; gap:8px; padding:5px 0; border-bottom:1px solid var(--border-soft);}
.comment-item:last-child{border-bottom:none;}
.comment-avatar{width:28px; height:28px; border-radius:9px; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; flex-shrink:0; font-size:10px;}
.comment-form{margin-top:8px; display:none;}
.comment-form .cf-row{display:flex; gap:7px; flex-wrap:wrap; align-items:flex-end;}
.comment-form select,.comment-form input[type=text]{padding:8px 11px; border:1.5px solid var(--border); border-radius:var(--r-sm); font-size:13px; background:var(--surface-2); color:var(--text); font-family:inherit;}
.comment-form select:focus,.comment-form input[type=text]:focus{outline:none; border-color:var(--brand); background:var(--surface);}
.comment-form select{flex:1; min-width:110px;}
.comment-form input[type=text]{flex:2; min-width:140px;}

/* itinerary */
.day-card{border-inline-start:5px solid var(--accent);}
.day-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap:8px;}
.day-head .dnum{font-family:'Frank Ruhl Libre',serif; font-weight:700; font-size:16px; color:var(--brand); white-space:nowrap;}
.day-head input{border:1.5px solid transparent; background:var(--surface-2); border-radius:9px; font-family:'Frank Ruhl Libre',serif;

.day-head input:focus{outline:none; border-color:var(--brand); background:var(--surface);}
.day-card.today{border-inline-start-color:var(--green); box-shadow:0 0 0 2px color-mix(in srgb,var(--green) 35%, transparent), var(--shadow);}
.block-label{font-size:11px; font-weight:700; color:var(--text-soft); margin:9px 0 3px;}

/* packing assignment chips */
.pack-item{padding:12px 0; border-bottom:1px solid var(--border-soft);}
.pack-item:last-child{border-bottom:none;}
.pack-item-top{display:flex; align-items:center; gap:11px;}
.pack-item-top input[type=checkbox]{width:20px; height:20px; accent-color:var(--green); flex-shrink:0; cursor:pointer;}
.pack-item-top .txt{flex:1; font-size:14px; line-height:1.4;}
.pack-item-top.done .txt{text-decoration:line-through; color:var(--text-mute);}
.pack-assign-row{display:flex; flex-wrap:wrap; align-items:center; gap:6px; margin-top:8px; padding-inline-start:31px;}
.assign-chip{display:flex; align-items:center; gap:5px; border:1.5px solid var(--border); border-radius:13px; padding:4px 10px;
  font-size:11px; font-weight:600; color:var(--text-soft); background:var(--surface-2); transition:all .12s; user-select:none;}
.assign-chip input[type=checkbox]{width:13px; height:13px; accent-color:var(--green); flex-shrink:0;}
.assign-chip.active{background:var(--green); color:#fff; border-color:var(--green);}
.dup-hint{font-size:11px; color:var(--accent-ink); background:color-mix(in srgb,var(--accent) 16%, transparent);
  border-radius:8px; padding:3px 9px; margin-top:6px; margin-inline-start:31px; display:inline-block; font-weight:600;}
.who-group-label{font-size:12px; font-weight:700; color:var(--text-soft); margin:14px 0 6px; display:flex; align-items:center; gap:7px;}

/* meal rota */
.meal-slot{border-top:1px solid var(--border-soft); padding-top:11px; margin-top:10px;}
.meal-slot:first-child{border-top:none; padding-top:0; margin-top:0;}
.meal-slot-label{font-size:12.5px; font-weight:700; color:var(--text); margin-bottom:8px;}
.fam-checks{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:9px;}
.fam-check{display:flex; align-items:center; gap:6px; border:1.5px solid var(--border); border-radius:14px; padding:6px 11px;
  font-size:11.5px; font-weight:600; color:var(--text-soft); background:var(--surface-2); transition:all .15s; user-select:none;}
.fam-check input[type=checkbox]{width:14px; height:14px; accent-color:var(--green); flex-shrink:0;}
.fam-check.active{background:var(--green); color:#fff; border-color:var(--green);}
.meal-dish-input{width:100%; border:1.5px solid var(--border); border-radius:9px; padding:8px 12px; font-size:13.5px;
  background:var(--surface-2); color:var(--text); margin-bottom:6px;}
.meal-dish-input:focus{outline:none; border-color:var(--brand); background:var(--surface);}
.meal-note-input{width:100%; border:1.5px solid var(--border-soft); border-radius:9px; padding:6px 12px; font-size:12px;
  color:var(--text-soft); background:var(--surface-2);}
.meal-note-input:focus{outline:none; border-color:var(--brand); background:var(--surface); color:var(--text);}
.shop-cat-bar{display:flex; gap:7px; overflow-x:auto; margin-bottom:9px; padding-bottom:4px;}
.shop-cat-tab{flex-shrink:0; background:var(--surface); border:1.5px solid var(--border); border-radius:20px; padding:7px 15px;
  font-size:12px; font-weight:600; color:var(--text-soft); transition:all .15s;}
.shop-cat-tab.active{background:var(--brand); color:#fff; border-color:var(--brand);}
details.meal-day{background:var(--surface); border-radius:var(--r-lg); margin-bottom:12px; box-shadow:var(--shadow);
  border:1px solid var(--border-soft); overflow:hidden;}
details.meal-day > summary{display:flex; align-items:center; gap:9px; padding:15px 17px; cursor:pointer; list-style:none; user-select:none; flex-wrap:wrap;}
details.meal-day > summary::-webkit-details-marker{display:none;}
.sum-chevron{font-size:10px; color:var(--text-mute); margin-inline-start:auto; transition:transform .2s; flex-shrink:0;}
details.meal-day[open] .sum-chevron{transform:rotate(180deg);}
.meal-slots-wrap{padding:0 17px 17px;}

/* map */
#trip-map{height:460px; border-radius:var(--r-lg); overflow:hidden; margin-bottom:10px; box-shadow:var(--shadow); border:1px solid var(--border-soft); z-index:1;}
@media(max-width:759px){#trip-map{height:calc(100dvh - 320px); min-height:330px;}}
.map-toolbar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;}
.map-filter{display:flex; align-items:center; gap:6px; border:1.5px solid var(--border); border-radius:20px; padding:6px 12px;
  font-size:11.5px; font-weight:600; color:var(--text-soft); background:var(--surface); transition:all .12s; user-select:none;}
.map-filter .map-dot{width:11px; height:11px;}
.map-filter.off{opacity:.4; text-decoration:line-through;}
.map-dot{width:12px; height:12px; border-radius:50%; border:2px solid var(--surface); box-shadow:0 1px 4px rgba(0,0,0,.25); flex-shrink:0; display:inline-block;}
.map-legend{display:flex; align-items:center; gap:13px; flex-wrap:wrap; font-size:12px; padding:11px 15px;}
.map-legend span{display:flex; align-items:center; gap:6px; color:var(--text-soft);}
.pin-mode-btn{width:100%; padding:12px; border:2px dashed var(--brand); border-radius:var(--r); background:color-mix(in srgb,var(--brand) 6%, transparent);

.pin-mode-btn.active{background:var(--brand); color:#fff; border-style:solid;}
.map-user-pin-card{background:var(--surface); border-radius:var(--r); padding:11px 13px; margin-bottom:9px; box-shadow:var(--shadow-sm);

.map-user-pin-card .pin-info{flex:1; min-width:0;}
.pin-name{font-weight:700; font-size:14px; color:var(--text);}
.pin-meta{font-size:11.5px; color:var(--text-soft); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.pin-actions{display:flex; gap:6px; flex-shrink:0;}
.suggest-box{position:relative;}
.suggest-list{position:absolute; top:calc(100% + 4px); inset-inline:0; background:var(--surface); border:1px solid var(--border);

.suggest-list.show{display:block;}
.suggest-item{padding:11px 14px; border-bottom:1px solid var(--border-soft); font-size:13px; cursor:pointer; display:flex; gap:9px; align-items:flex-start;}
.suggest-item:last-child{border-bottom:none;}
.suggest-item:hover,.suggest-item.active{background:var(--surface-2);}
.suggest-item .si-ic{flex-shrink:0;}
.suggest-item .si-main{font-weight:600; color:var(--text);}
.suggest-item .si-sub{font-size:11px; color:var(--text-mute); margin-top:1px;}
.suggest-loading{padding:12px 14px; font-size:12px; color:var(--text-mute); text-align:center;}

/* leaflet popup theming */
.leaflet-popup-content-wrapper{background:var(--surface); color:var(--text); border-radius:var(--r);}
.leaflet-popup-tip{background:var(--surface);}
.leaflet-popup-content{margin:13px 15px; font-family:'Heebo',sans-serif;}
.lp-nav{margin-top:9px; width:100%; background:#1b8ef0; color:#fff; border:none; border-radius:8px; padding:7px; font-size:12px; font-weight:700; font-family:'Heebo',sans-serif; cursor:pointer;}
.lp-actions{display:flex; gap:6px; margin-top:8px;}
.lp-actions button{flex:1; border-radius:8px; padding:6px; font-size:11.5px; font-weight:700; font-family:'Heebo',sans-serif; cursor:pointer; border:1.5px solid;}
.lp-edit{border-color:var(--brand); color:var(--brand); background:none;}
.lp-del{border-color:var(--terra); color:var(--terra); background:none;}

/* modal + toast + search overlay */
.modal-overlay{position:fixed; inset:0; background:rgba(8,18,28,.55); z-index:200; display:flex; align-items:center;
  justify-content:center; padding:22px; opacity:0; transition:opacity .2s; backdrop-filter:blur(3px);}
.modal-overlay.show{opacity:1;}
.modal{background:var(--surface); border-radius:var(--r-xl); padding:24px; max-width:380px; width:100%; box-shadow:var(--shadow-lg);

.modal-overlay.show .modal{transform:none;}
.modal .m-ic{font-size:34px; margin-bottom:10px;}
.modal .m-msg{font-size:15px; color:var(--text); margin-bottom:20px; line-height:1.6;}
.modal .m-btns{display:flex; gap:10px;}
.modal .m-btns .btn{flex:1; padding:12px;}

#save-toast{position:fixed; bottom:calc(96px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%) translateY(10px);
  background:var(--text); color:var(--surface); padding:10px 22px; border-radius:22px; font-size:13.5px; font-weight:600;
  z-index:300; opacity:0; transition:opacity .3s, transform .3s; pointer-events:none; white-space:nowrap; box-shadow:var(--shadow-lg);}
#save-toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
@media(min-width:920px){#save-toast{bottom:28px;}}

.more-overlay{position:fixed; inset:0; background:rgba(8,18,28,.5); z-index:120; display:none; backdrop-filter:blur(2px);}
.more-overlay.show{display:block;}
.more-sheet{position:absolute; bottom:0; left:0; right:0; background:var(--surface); border-radius:var(--r-xl) var(--r-xl) 0 0;
  padding:20px 18px calc(20px + env(safe-area-inset-bottom)); max-width:1320px; margin:0 auto; box-shadow:0 -12px 40px rgba(0,0,0,.2);
  animation:sheetUp .28s cubic-bezier(.2,.8,.2,1);}
@keyframes sheetUp{from{transform:translateY(100%);} to{transform:none;}}
.more-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:11px; margin-top:8px;}
.more-grid .opt{background:var(--surface-2); border:1px solid var(--border-soft); border-radius:var(--r); padding:15px 6px; text-align:center;
  font-size:11.5px; font-weight:600; color:var(--text-soft); display:flex; flex-direction:column; align-items:center; gap:7px;}
.more-grid .opt.active{background:color-mix(in srgb,var(--brand) 13%, transparent); color:var(--brand);}
.more-grid .opt .ic{font-size:23px;}
.more-close{display:block; width:100%; text-align:center; padding:13px; margin-top:14px; background:var(--surface-2); border:none;
  border-radius:var(--r); color:var(--text-soft); font-size:14px; font-weight:600;}

.search-overlay{position:fixed; inset:0; background:rgba(8,18,28,.5); z-index:210; display:none; backdrop-filter:blur(3px); padding:14px;}
.search-overlay.show{display:block;}
.search-panel{background:var(--surface); border-radius:var(--r-lg); max-width:560px; margin:6vh auto 0; box-shadow:var(--shadow-lg);
  overflow:hidden; border:1px solid var(--border-soft); animation:pop .25s cubic-bezier(.2,.8,.2,1);}
.search-head{display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid var(--border-soft);}
.search-head input{flex:1; border:none; background:none; font-size:16px; color:var(--text); padding:4px 0;}
.search-head input:focus{outline:none;}
.search-results{max-height:62vh; overflow-y:auto; padding:6px;}
.search-group-label{font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; color:var(--text-mute); padding:10px 12px 4px;}
.search-result{display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:11px; cursor:pointer; width:100%; text-align:start; background:none; border:none;}
.search-result:hover,.search-result.active{background:var(--surface-2);}
.search-result .sr-ic{font-size:19px; flex-shrink:0; width:24px; text-align:center;}
.search-result .sr-title{font-size:14px; font-weight:600; color:var(--text);}
.search-result .sr-sub{font-size:11.5px; color:var(--text-mute);}
.search-result .sr-tab{margin-inline-start:auto; font-size:10.5px; color:var(--text-mute); background:var(--surface-3); padding:3px 8px; border-radius:8px; white-space:nowrap;}

  return new Promise((resolve, reject)=>{
    const s = document.createElement('script');
    s.src = src; s.async = true;
    s.onload = resolve; s.onerror = ()=>reject(new Error('failed to load '+src));
    document.head.appendChild(s);
  });
}
function initAppCheck(){
  if(!APPCHECK_SITE_KEY) return Promise.resolve(null);   // disabled → no-op
  if(_appCheckReady) return _appCheckReady;
  _appCheckReady = (async ()=>{
    try{
      const base = `https://www.gstatic.com/firebasejs/${FIREBASE_SDK_VERSION}`;
      await _loadScript(`${base}/firebase-app-compat.js`);
      await _loadScript(`${base}/firebase-app-check-compat.js`);
      if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      const ac = firebase.appCheck();
      ac.activate(new firebase.appCheck.ReCaptchaV3Provider(APPCHECK_SITE_KEY), true);
      return ac;
    }catch(e){ console.warn('App Check unavailable, continuing without it', e); return null; }
  })();
  return _appCheckReady;
}
// Returns the App Check header to merge into a fetch, or {} if disabled/unavailable.
async function appCheckHeaders(){
  if(!APPCHECK_SITE_KEY) return {};
  try{
    const ac = await initAppCheck();
    if(!ac) return {};
    const { token } = await ac.getToken(false);
    return token ? { 'X-Firebase-AppCheck': token } : {};
  }catch(e){ return {}; }
}

async function loadKey(key, fallback){
  try{
    const res = await fetch(`${FIREBASE_URL}/${encodeURIComponent(key)}.json`, { headers: await appCheckHeaders() });
    if(!res.ok) throw new Error('bad response');
    const data = await res.json();
    if(data === null || data === undefined){
      const cached = localStorage.getItem(LS_PREFIX + key);
      if(cached){ try{ return JSON.parse(cached); }catch(e){} }
      return fallback;
    }
    localStorage.setItem(LS_PREFIX + key, JSON.stringify(data));
    return data;
  }catch(e){
    const cached = localStorage.getItem(LS_PREFIX + key);
    if(cached){ try{ setFbStatus(false, true); return JSON.parse(cached); }catch(e2){} }
    return fallback;
  }
}
async function saveKey(key, value){
  localStorage.setItem(LS_PREFIX + key, JSON.stringify(value));
  try{
    await fetch(`${FIREBASE_URL}/${encodeURIComponent(key)}.json`, {
      method:'PUT',
      headers:{'Content-Type':'application/json', ...(await appCheckHeaders())},
      body: JSON.stringify(value)
    });
    setFbStatus(true);
    showToast('נשמר ✓');
  }catch(e){ setFbStatus(false); }
}

function setFbStatus(ok, offline=false){
  const dots = document.querySelectorAll('.fb-dot');

  if(offline){ cls='fb-dot warn'; msg='מציג נתונים שמורים — לא מחובר'; }

  dots.forEach(d=>d.className=cls);
  txts.forEach(t=>t.textContent=msg);

============================================================ */
function uid(){ return Math.random().toString(36).slice(2,9); }
function el(id){ return document.getElementById(id); }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function q(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\x22').replace(/[\r\n]+/g,' '); }
function debounce(fn, ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; }

function distKm(a, b){
  const R=6371, toR=x=>x*Math.PI/180;
  const dLat=toR(b[0]-a[0]), dLng=toR(b[1]-a[1]);
  const s=Math.sin(dLat/2)**2 + Math.cos(toR(a[0]))*Math.cos(toR(b[0]))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
function fmtDistFromVilla(lat, lng){
  if(lat==null||lng==null) return '';
  const d = distKm(VILLA_COORDS, [lat,lng]);
  if(d < 1) return 'ליד הווילה';
  return `~${d<10 ? d.toFixed(1) : Math.round(d)} ק"מ מהווילה`;
}
function relTime(ts, fallback){
  if(!ts) return fallback||'';
  const diff = Date.now() - ts, m=60000, h=3600000, d=86400000;
  if(diff < m) return 'הרגע';
  if(diff < h) return `לפני ${Math.floor(diff/m)} דק׳`;
  if(diff < d) return `לפני ${Math.floor(diff/h)} שע׳`;
  if(diff < 7*d) return `לפני ${Math.floor(diff/d)} ימים`;
  return fallback || new Date(ts).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'});
}
function telHref(phone){ return 'tel:' + (phone||'').replace(/[^+\d]/g,''); }
function hasDigits(s){ return /\d/.test(s||''); }

function navTo(lat, lng, label){

function confirmModal(message, opts={}){
  const {okText='אישור', cancelText='ביטול', icon='⚠️', danger=true} = opts;
  return new Promise(resolve=>{
    const root = el('modal-root');
    const ov = document.createElement('div');
    ov.className='modal-overlay';
    ov.innerHTML = `<div class="modal" role="dialog" aria-modal="true">
      <div class="m-ic">${icon}</div>
      <div class="m-msg">${escapeHtml(message)}</div>
      <div class="m-btns">
        <button class="btn btn-ghost" data-act="cancel">${escapeHtml(cancelText)}</button>
        <button class="btn ${danger?'':'btn-save'}" data-act="ok" style="${danger?'background:var(--danger)':''}">${escapeHtml(okText)}</button>
      </div></div>`;
    root.appendChild(ov);
    requestAnimationFrame(()=>ov.classList.add('show'));
    const close = (val)=>{ ov.classList.remove('show'); setTimeout(()=>ov.remove(),200); resolve(val); };
    ov.querySelector('[data-act=ok]').onclick = ()=>close(true);
    ov.querySelector('[data-act=cancel]').onclick = ()=>close(false);
    ov.addEventListener('click', e=>{ if(e.target===ov) close(false); });
    document.addEventListener('keydown', function esc(e){ if(e.key==='Escape'){ document.removeEventListener('keydown',esc); close(false); } });
  });
}
function alertModal(message, icon='ℹ️'){
  return new Promise(resolve=>{
    const root = el('modal-root');
    const ov = document.createElement('div');
    ov.className='modal-overlay';
    ov.innerHTML = `<div class="modal" role="dialog" aria-modal="true">
      <div class="m-ic">${icon}</div>
      <div class="m-msg">${escapeHtml(message)}</div>
      <div class="m-btns"><button class="btn btn-save" data-act="ok">הבנתי</button></div></div>`;
    root.appendChild(ov);
    requestAnimationFrame(()=>ov.classList.add('show'));
    const close = ()=>{ ov.classList.remove('show'); setTimeout(()=>ov.remove(),200); resolve(); };
    ov.querySelector('[data-act=ok]').onclick = close;
  });
}

/* ============================================================

============================================================ */
function computeCountdown(){
  const now = new Date();
  const diff = Math.ceil((TRIP_START - now) / 86400000);
  if(diff > 0) return {num: diff, label:'ימים<br>לטיסה'};
  if(now <= TRIP_END){
    const dayN = Math.floor((now - TRIP_START)/86400000) + 1;
    return {num:'🎉', label:`יום ${dayN}<br>בטיול`};
  }
  return {num:'✓', label:'חזרנו<br>הביתה'};
}
function updateCountdown(){
  const c = computeCountdown();
  document.querySelectorAll('.cd-num').forEach(n=>n.textContent = c.num);
  document.querySelectorAll('.cd-label').forEach(l=>l.innerHTML = c.label);
}

async function boot(){
  updateCountdown();
  initAppCheck();          // no-op unless APPCHECK_SITE_KEY is set; warms the token early
  checkFbConnection();
  if(!cache.bootDone){
    setInterval(checkFbConnection, 30000);
    setInterval(updateCountdown, 60000);
    cache.bootDone = true;
  }
  await switchTab(currentTab || 'home');
}

async function buildSearchIndex(){
  const [itin, places, attrs, kosher, syns, contacts, pShared, pPersonal, tasks, board, pins] = await Promise.all([
    loadKey('itinerary-days',[]), loadKey('places',[]), loadKey('villa-attractions-custom',[]),
    loadKey('kosher-spots',[]), loadKey('synagogues',[]), loadKey('contacts',[]),
    loadKey('packing-shared',[]), loadKey('packing-personal',{}), loadKey('tasks',[]),
    loadKey('board',[]), loadKey('map-pins',[])
  ]);
  const idx = [];
  const add = (tab, ic, title, sub) => idx.push({tab, ic, title, sub:sub||'', hay:(title+' '+(sub||'')).toLowerCase()});
  (itin||[]).forEach(d=>{ if(d.city||d.morning||d.noon||d.evening) add('itinerary','🗓️',`יום ${d.num}${d.city?' · '+d.city:''}`,[d.morning,d.noon,d.evening].filter(Boolean).join(' · ')); });
  (places||[]).forEach(p=>add('places','📍',p.name,p.note));
  (attrs||[]).forEach(a=>add('villa-attractions','⭐',a.name,a.desc));
  (typeof HARDCODED_ATTRACTIONS!=='undefined'?HARDCODED_ATTRACTIONS:[]).forEach(a=>add('villa-attractions','🏛️',a.name,a.desc));
  (kosher||[]).forEach(s=>add('kosher','🍽️',s.name,(s.city||'')+(s.note?' · '+s.note:'')));
  (syns||[]).forEach(s=>add('kosher','🕍',s.name,s.address));
  (contacts||[]).forEach(c=>add('contacts','📞',c.name,(c.phone||'')+(c.note?' · '+c.note:'')));
  (pShared||[]).forEach(it=>add('packing','🎒',it.text,'רשימה משותפת'));
  Object.entries(pPersonal||{}).forEach(([fam,list])=>(list||[]).forEach(it=>add('packing','🧍',it.text,fam)));
  (tasks||[]).forEach(t=>add('tasks','✅',t.text,t.owner));
  (board||[]).forEach(n=>add('board','📋',n.text,n.author));
  (pins||[]).forEach(p=>add('map','📌',p.name,p.note));
  cache.searchIndex = idx;
}
async function openSearch(){
  const ov = el('search-overlay');
  ov.classList.add('show');
  const inp = el('search-input'); inp.value=''; 
  el('search-results').innerHTML = '<div class="suggest-loading">טוען נתונים…</div>';
  await buildSearchIndex();
  runSearch('');
  setTimeout(()=>inp.focus(), 50);
}
function closeSearch(){ el('search-overlay').classList.remove('show'); }
function runSearch(qstr){
  const res = el('search-results');
  const idx = cache.searchIndex || [];
  const tokens = qstr.trim().toLowerCase().split(/\s+/).filter(Boolean);
  let hits = tokens.length ? idx.filter(it=>tokens.every(t=>it.hay.includes(t))) : [];
  if(!tokens.length){ res.innerHTML = '<div class="suggest-loading">הקלידו לחיפוש בכל הלשוניות…</div>'; return; }
  if(!hits.length){ res.innerHTML = '<div class="empty-hint">לא נמצאו תוצאות</div>'; return; }
  hits = hits.slice(0,40);
  const tabLabel = id => (TABS.find(t=>t.id===id)||{}).label || id;
  res.innerHTML = hits.map(h=>`
    <button class="search-result" onclick="closeSearch(); switchTab('${h.tab}')">
      <span class="sr-ic">${h.ic}</span>
      <span style="min-width:0"><div class="sr-title">${escapeHtml(h.title)}</div>${h.sub?`<div class="sr-sub">${escapeHtml(h.sub)}</div>`:''}</span>
      <span class="sr-tab">${tabLabel(h.tab)}</span>
    </button>`).join('');
}
function initGlobalListeners(){
  const inp = el('search-input');
  if(inp) inp.addEventListener('input', debounce(e=>runSearch(e.target.value), 160));
  document.addEventListener('keydown', e=>{
    if((e.ctrlKey||e.metaKey) && (e.key==='k'||e.key==='K')){ e.preventDefault(); if(el('app').style.display!=='none') openSearch(); }
    if(e.key==='Escape'){ closeSearch(); closeMore(); }
  });
}

async function renderPackBody(){
  const shared = await loadKey('packing-shared', null) || defaultSharedPacking();
  if(!cache.packInit){ await saveKey('packing-shared', shared); cache.packInit=true; }
  const personalAll = await loadKey('packing-personal', {});
  if(!cache.currentPerson) cache.currentPerson = FAMILIES[0];
  const body = el('pack-body'); if(!body) return;
  const v = cache.packView || 'shared';
  body.innerHTML = v==='shared' ? viewShared(shared) : v==='personal' ? viewPersonal(personalAll, shared) : viewWho(personalAll, shared);
  if(cache.editPack){ const i=el('pack-edit-input'); if(i){ i.focus(); i.select(); } }
}
function viewShared(shared){
  const done = shared.filter(x=>x.done).length;
  const rows = shared.length ? shared.map(it=>{
    const editing = isEditingPack('shared', it.id);
    const assigned = it.assignedTo||[];
    const chips = FAMILIES.map(f=>{ const on=assigned.includes(f); return `<label class="assign-chip${on?' active':''}"><input type="checkbox"${on?' checked':''} onchange="togglePackingAssignment('${it.id}','${q(f)}',this.checked)">${escapeHtml(f)}</label>`; }).join('');
    return `<div class="pack-item">
      <div class="pack-item-top${it.done?' done':''}">
        <input type="checkbox"${it.done?' checked':''} onchange="toggleSharedDone('${it.id}',this.checked)">
        ${editing ? packEditInput('shared', it.id, it.text)
          : `<span class="txt">${escapeHtml(it.text)}</span><button class="btn-icon" aria-label="עריכה" onclick="editPack('shared','${it.id}')">✏️</button><button class="btn-del" aria-label="מחיקה" onclick="delShared('${it.id}')">✕</button>`}
      </div>
      <div class="pack-assign-row"><span class="muted" style="font-size:10.5px;flex-shrink:0">👥 מי מביא:</span>${chips}</div>
    </div>`;
  }).join('') : '<div class="empty-hint">הרשימה ריקה</div>';
  return progressHtml(done, shared.length) + `<div class="card">${rows}
    <div class="row" style="margin-top:10px"><input type="text" id="shared-new" placeholder="הוספת פריט משותף..." onkeydown="if(event.key==='Enter')addShared()"><button class="btn btn-add" onclick="addShared()">+</button></div></div>
    <p class="muted">סמנו אילו משפחות מביאות כל פריט — הסיכום מופיע בלשונית "מי מביא מה".</p>`;
}
function viewPersonal(personalAll, shared){
  const fam = cache.currentPerson;
  const list = personalAll[fam] || defaultPersonalPacking();
  const done = list.filter(x=>x.done).length;
  const sharedTexts = new Set((shared||[]).map(s=>normTxt(s.text)));
  const rows = list.length ? list.map(it=>{
    const editing = isEditingPack('personal', it.id);
    const dup = sharedTexts.has(normTxt(it.text));
    return `<div class="pack-item"><div class="pack-item-top${it.done?' done':''}">
      <input type="checkbox"${it.done?' checked':''} onchange="togglePersonalDone('${q(fam)}','${it.id}',this.checked)">
      ${editing ? packEditInput('personal', it.id, it.text)
        : `<span class="txt">${escapeHtml(it.text)}</span><button class="btn-icon" aria-label="עריכה" onclick="editPack('personal','${it.id}')">✏️</button><button class="btn-del" aria-label="מחיקה" onclick="delPersonalItem('${q(fam)}','${it.id}')">✕</button>`}
      </div>${dup?`<div class="dup-hint">💡 כבר קיים ברשימה המשותפת</div>`:''}</div>`;
  }).join('') : '<div class="empty-hint">הרשימה ריקה</div>';
  return famSelectHtml('selectPackPerson', fam) + progressHtml(done, list.length) + `<div class="card">${rows}
    <div class="row" style="margin-top:10px"><input type="text" id="personal-new" placeholder="הוספת פריט אישי..." onkeydown="if(event.key==='Enter')addPersonal()"><button class="btn btn-add" onclick="addPersonal()">+</button></div></div>`;
}
function viewWho(personalAll, shared){
  const fam = cache.currentPerson;
  const personal = personalAll[fam] || defaultPersonalPacking();
  const sharedAssigned = (shared||[]).filter(s=>(s.assignedTo||[]).includes(fam));
  const totalDone = personal.filter(x=>x.done).length + sharedAssigned.filter(x=>x.done).length;
  const total = personal.length + sharedAssigned.length;
  const whoRow = (scope,it)=>{
    const toggle = scope==='personal' ? `togglePersonalDone('${q(fam)}','${it.id}',this.checked)` : `toggleSharedDone('${it.id}',this.checked)`;
    return `<div class="checkrow${it.done?' done':''}"><input type="checkbox"${it.done?' checked':''} onchange="${toggle}"><span class="txt">${escapeHtml(it.text)}</span>${scope==='shared'?'<span class="tag shared">משותף</span>':''}</div>`;
  };
  const persRows = personal.length ? personal.map(it=>whoRow('personal',it)).join('') : '<div class="empty-hint">אין פריטים אישיים</div>';
  const shRows = sharedAssigned.length ? sharedAssigned.map(it=>whoRow('shared',it)).join('') : '<div class="empty-hint">לא שויכו פריטים מהרשימה המשותפת</div>';
  return famSelectHtml('selectPackPerson', fam) + progressHtml(totalDone, total) +
    `<div class="who-group-label">🧍 הרשימה האישית של ${escapeHtml(fam)}</div><div class="card">${persRows}</div>
     <div class="who-group-label">🎒 מהרשימה המשותפת — משויך אליכם</div><div class="card">${shRows}</div>
     <p class="muted">תצוגה זו מאחדת את הרשימה האישית של המשפחה עם הפריטים המשותפים ששויכו אליה.</p>`;
}
function editPack(scope,id){ cache.editPack={scope,id}; renderPackBody(); }
function cancelPackEdit(){ cache.editPack=null; renderPackBody(); }
async function savePackEdit(scope,id){
  const inp = el('pack-edit-input'); if(!inp) return;
  const val = inp.value.trim(); if(!val){ cancelPackEdit(); return; }
  if(scope==='shared'){ const list=await loadKey('packing-shared',[]); const it=list.find(x=>x.id===id); if(it)it.text=val; await saveKey('packing-shared',list); }
  else { const fam=cache.currentPerson; const all=await loadKey('packing-personal',{}); const list=all[fam]||defaultPersonalPacking(); const it=list.find(x=>x.id===id); if(it)it.text=val; all[fam]=list; await saveKey('packing-personal',all); }
  cache.editPack=null; renderPackBody();
}
async function toggleSharedDone(id,checked){ const list=await loadKey('packing-shared',[]); const it=list.find(x=>x.id===id); if(it)it.done=checked; await saveKey('packing-shared',list); renderPackBody(); }
async function togglePackingAssignment(id,family,checked){ const list=await loadKey('packing-shared',[]); const it=list.find(x=>x.id===id); if(!it)return; if(!it.assignedTo)it.assignedTo=[]; if(checked){ if(!it.assignedTo.includes(family))it.assignedTo.push(family); } else { it.assignedTo=it.assignedTo.filter(f=>f!==family); } await saveKey('packing-shared',list); renderPackBody(); }
async function delShared(id){ if(!(await confirmModal('למחוק את הפריט?')))return; let list=await loadKey('packing-shared',[]); list=list.filter(x=>x.id!==id); await saveKey('packing-shared',list); renderPackBody(); }
async function addShared(){ const i=el('shared-new'); const v=i.value.trim(); if(!v)return; const list=await loadKey('packing-shared',[]); list.push({id:uid(),text:v,done:false,assignedTo:[]}); await saveKey('packing-shared',list); renderPackBody(); }
async function togglePersonalDone(fam,id,checked){ const all=await loadKey('packing-personal',{}); const list=all[fam]||defaultPersonalPacking(); const it=list.find(x=>x.id===id); if(it)it.done=checked; all[fam]=list; await saveKey('packing-personal',all); renderPackBody(); }
async function delPersonalItem(fam,id){ if(!(await confirmModal('למחוק את הפריט?')))return; const all=await loadKey('packing-personal',{}); let list=all[fam]||[]; list=list.filter(x=>x.id!==id); all[fam]=list; await saveKey('packing-personal',all); renderPackBody(); }
async function addPersonal(){ const i=el('personal-new'); const v=i.value.trim(); if(!v)return; const fam=cache.currentPerson; const all=await loadKey('packing-personal',{}); const list=all[fam]||defaultPersonalPacking(); list.push({id:uid(),text:v,done:false}); all[fam]=list; await saveKey('packing-personal',all); renderPackBody(); }

RENDERERS.tasks = async function(){
  const tasks = await loadKey('tasks', []);
  if(!cache.taskFilter) cache.taskFilter='all';
  el('main-content').innerHTML = `
    <div class="section-title">✅ מטלות לפני הנסיעה</div>
    <div class="card">
      <div class="row"><input type="text" id="task-text" placeholder="מה צריך לעשות..." onkeydown="if(event.key==='Enter')addTask()"></div>
      <div class="row"><select id="task-owner"><option value="">מי אחראי? (אופציונלי)</option>${FAMILIES.map(f=>`<option>${escapeHtml(f)}</option>`).join('')}</select><button class="btn btn-add" id="task-btn" onclick="addTask()">הוספה</button></div>
    </div>
    <div class="segmented">
      <button class="${cache.taskFilter==='all'?'active':''}" onclick="setTaskFilter('all')">הכל</button>
      <button class="${cache.taskFilter==='open'?'active':''}" onclick="setTaskFilter('open')">פתוחות</button>
      <button class="${cache.taskFilter==='done'?'active':''}" onclick="setTaskFilter('done')">הושלמו</button>
    </div>
    <div id="tasks-list"></div>`;
  renderTasksList(tasks);
};
function setTaskFilter(f){ cache.taskFilter=f; RENDERERS.tasks(); }
function renderTasksList(tasks){
  const done = tasks.filter(t=>t.done).length;
  let filtered = tasks;
  if(cache.taskFilter==='open') filtered = tasks.filter(t=>!t.done);
  if(cache.taskFilter==='done') filtered = tasks.filter(t=>t.done);
  const rows = filtered.length ? filtered.map(t=>`
    <div class="card checkrow ${t.done?'done':''}" style="margin-bottom:8px">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${t.id}',this.checked)">
      <div style="flex:1;min-width:0"><span class="txt">${escapeHtml(t.text)}</span>${t.owner?`<div class="muted" style="margin-top:2px">אחראי/ת: ${escapeHtml(t.owner)}</div>`:''}</div>
      <button class="btn-icon" aria-label="עריכה" onclick="editTask('${t.id}')">✏️</button>
      <button class="btn-del" aria-label="מחיקה" onclick="delTask('${t.id}')">✕</button>
    </div>`).join('') : '<div class="card empty-hint">אין מטלות בקטגוריה זו</div>';
  el('tasks-list').innerHTML = (tasks.length?progressHtml(done,tasks.length):'') + rows;
}
async function addTask(){
  const text = el('task-text').value.trim(); if(!text) return;
  const owner = el('task-owner').value;
  const tasks = await loadKey('tasks', []);
  if(cache.editTaskId){ const t=tasks.find(x=>x.id===cache.editTaskId); if(t){t.text=text;t.owner=owner;} cache.editTaskId=null; }
  else tasks.push({id:uid(), text, owner, done:false});
  await saveKey('tasks', tasks); RENDERERS.tasks();
}
async function editTask(id){
  const tasks = await loadKey('tasks', []); const t=tasks.find(x=>x.id===id); if(!t)return;
  cache.editTaskId=id; el('task-text').value=t.text; el('task-owner').value=t.owner||'';
  el('task-btn').textContent='עדכון ✓'; el('task-text').focus();
}
async function toggleTask(id,checked){ const tasks=await loadKey('tasks',[]); const t=tasks.find(x=>x.id===id); if(t)t.done=checked; await saveKey('tasks',tasks); renderTasksList(tasks); }
async function delTask(id){ if(!(await confirmModal('למחוק את המטלה?')))return; let tasks=await loadKey('tasks',[]); tasks=tasks.filter(t=>t.id!==id); await saveKey('tasks',tasks); RENDERERS.tasks(); }

RENDERERS.preflight = async function(){

function renderPFBody(all){

      <input type="checkbox" ${it.done?'checked':''} onchange="togglePF('${q(fam)}','${it.id}',this.checked)">
      ${editing ? `<input class="edit-inline" id="pf-edit-input" value="${escapeHtml(it.text)}" onkeydown="if(event.key==='Enter')savePFEdit('${q(fam)}','${it.id}');if(event.key==='Escape')cancelPFEdit()"><button class="btn-icon" onclick="savePFEdit('${q(fam)}','${it.id}')">✓</button><button class="btn-icon" onclick="cancelPFEdit()">✕</button>`
        : `<span class="txt">${escapeHtml(it.text)}</span><button class="btn-icon" aria-label="עריכה" onclick="editPF('${q(fam)}','${it.id}')">✏️</button><button class="btn-del" aria-label="מחיקה" onclick="delPF('${q(fam)}','${it.id}')">✕</button>`}
    </div>`;

  el('pf-wrap').innerHTML = famSelectHtml('selectPF', fam) + progressHtml(done, list.length) + `<div class="card">${rows}
    <div class="row" style="margin-top:10px"><input type="text" id="pf-new" placeholder="הוספת פריט..." onkeydown="if(event.key==='Enter')addPF()"><button class="btn btn-add" onclick="addPF()">+</button></div></div>`;

}
async function selectPF(name){ cache.currentPFFamily=name; cache.editPF=null; const all=await loadKey('preflight',{}); renderPFBody(all); }
async function togglePF(fam,id,checked){ const all=await loadKey('preflight',{}); const list=all[fam]||defaultPreflightItems(); const it=list.find(x=>x.id===id); if(it)it.done=checked; all[fam]=list; await saveKey('preflight',all); renderPFBody(all); }
async function addPF(){ const v=el('pf-new').value.trim(); if(!v)return; const fam=cache.currentPFFamily; const all=await loadKey('preflight',{}); const list=all[fam]||defaultPreflightItems(); list.push({id:uid(),text:v,done:false}); all[fam]=list; await saveKey('preflight',all); renderPFBody(all); }
async function delPF(fam,id){ if(!(await confirmModal('למחוק את הפריט?')))return; const all=await loadKey('preflight',{}); let list=all[fam]||[]; list=list.filter(x=>x.id!==id); all[fam]=list; await saveKey('preflight',all); renderPFBody(all); }
async function editPF(fam,id){ cache.editPF={fam,id}; const all=await loadKey('preflight',{}); renderPFBody(all); }
async function cancelPFEdit(){ cache.editPF=null; const all=await loadKey('preflight',{}); renderPFBody(all); }
async function savePFEdit(fam,id){ const inp=el('pf-edit-input'); if(!inp)return; const val=inp.value.trim(); if(!val){cancelPFEdit();return;} const all=await loadKey('preflight',{}); const list=all[fam]||defaultPreflightItems(); const it=list.find(x=>x.id===id); if(it)it.text=val; all[fam]=list; await saveKey('preflight',all); cache.editPF=null; renderPFBody(all); }

function toggleCommentForm(noteId){

async function addComment(noteId){
  const authorEl = el('ca-' + noteId), textEl = el('ct-' + noteId);
  if(!authorEl || !textEl) return;
  const author = authorEl.value, text = textEl.value.trim();
  if(!author){ alertModal('נא לבחור שם', '👤'); return; }
  if(!text) return;
  const board = await loadKey('board', []);
  const note = board.find(n=>n.id===noteId);

async function delComment(noteId, commentId){

}

const MEAL_CAT_LABELS = {pareve:'פרווה', dairy:'חלבי', produce:'ירקות ופירות', cleaning:'ניקיון', other:'אחר'};
const MEAL_CAT_COLORS = {pareve:'var(--green)', dairy:'var(--brand)', produce:'#5c8f3e', cleaning:'#7a7a7a', other:'#a0a0a0'};

function defaultMealRota(){
  const days=[], endMs=TRIP_END.getTime();
  let d=new Date(TRIP_START), dayNum=1;
  while(d.getTime()<=endMs){
    const dow=d.getDay(), isShabbat=dow===6, isErevShabbat=dow===5;
    const isArrival=dayNum===1, isDeparture=d.getTime()===endMs;
    const dateStr=d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'});
    const HE_DAY=['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','שבת'][dow];
    let dayLabel, meals;
    if(isShabbat){
      dayLabel='שבת קודש';
      meals=[
        {slot:'shabbat-lunch',   label:'🍷 סעודת שחרית',  families:[], dish:'', note:''},
        {slot:'seudah-shlishit', label:'🍞 סעודה שלישית', families:[], dish:'', note:''},
        {slot:'melave-malka',    label:'✨ מלווה מלכה',   families:[], dish:'', note:'הבדלה: ~21:10'}
      ];
    } else if(isErevShabbat){
      dayLabel=`יום ${HE_DAY} — ערב שבת`;
      meals=[
        {slot:'breakfast',      label:'☀️ ארוחת בוקר',   families:[], dish:'', note:''},
        {slot:'lunch',          label:'🌤 ארוחת צהריים',  families:[], dish:'', note:''},
        {slot:'shabbat-dinner', label:'🕯️ סעודת שבת',    families:[], dish:'', note:'הדלקת נרות: 20:06'}
      ];
    } else if(isArrival){
      dayLabel=`יום ${HE_DAY} — הגעה לווילה`;
      meals=[
        {slot:'breakfast', label:'☀️ ארוחת בוקר',   families:[], dish:'', note:'טיסה 18:00 — אכילה בנתב"ג'},
        {slot:'lunch',     label:'🌤 ארוחת צהריים',  families:[], dish:'', note:''},
        {slot:'dinner',    label:'🌙 ארוחת ערב',     families:[], dish:'ארוחת פתיחה — ראשונה בווילה 🎉', note:'נחיתה ~20:40 ✈️'}
      ];
    } else if(isDeparture){
      dayLabel=`יום ${HE_DAY} — יום עזיבה`;
      meals=[ {slot:'breakfast', label:'☀️ ארוחת בוקר אחרונה', families:[], dish:'', note:"צ'ק-אאוט עד 10:00 🧳"} ];
    } else {
      dayLabel=`יום ${HE_DAY}`;
      meals=[
        {slot:'breakfast', label:'☀️ ארוחת בוקר',  families:[], dish:'', note:''},
        {slot:'lunch',     label:'🌤 ארוחת צהריים', families:[], dish:'', note:''},
        {slot:'dinner',    label:'🌙 ארוחת ערב',    families:[], dish:'', note:''}
      ];
    }
    days.push({id:uid(), date:dateStr, dayNum, dayLabel, isShabbat, isErevShabbat, meals});
    d.setDate(d.getDate()+1); dayNum++;
  }
  return days;
}

function buildMealRotaHtml(days, shopping){
  const dayCards = days.map(day=>{
    const accent = day.isShabbat ? 'var(--terra)' : day.isErevShabbat ? 'var(--accent)' : 'var(--brand)';
    const today = isToday(dayDate(day.dayNum));
    const badge = day.isShabbat ? `<span class="tag" style="background:var(--terra)">שבת קודש ✨</span>`
      : day.isErevShabbat ? `<span class="tag" style="background:var(--accent);color:var(--accent-ink)">ערב שבת 🕯️</span>` : '';
    const slots = day.meals.map(meal=>{
      const famChecks = FAMILIES.map(f=>{
        const checked=(meal.families||[]).includes(f);
        return `<label class="fam-check${checked?' active':''}"><input type="checkbox"${checked?' checked':''} onchange="toggleMealFamily('${day.id}','${meal.slot}','${q(f)}',this.checked);this.parentElement.classList.toggle('active',this.checked)">${escapeHtml(f)}</label>`;
      }).join('');
      return `<div class="meal-slot">
        <div class="meal-slot-label">${meal.label}</div>
        <div class="fam-checks">${famChecks}</div>
        <input class="meal-dish-input" type="text" value="${escapeHtml(meal.dish||'')}" placeholder="מה מכינים? (תפריט, רעיון...)" onblur="saveMealField('${day.id}','${meal.slot}','dish',this.value)">
        <input class="meal-note-input" type="text" value="${escapeHtml(meal.note||'')}" placeholder="הערה (שעה, אלרגיה, קניות...)" onblur="saveMealField('${day.id}','${meal.slot}','note',this.value)">
      </div>`;
    }).join('');
    return `<details class="meal-day" style="border-inline-start:5px solid ${accent}${today?';box-shadow:0 0 0 2px color-mix(in srgb,var(--green) 40%,transparent),var(--shadow)':''}" open>
      <summary>
        <span style="font-family:'Frank Ruhl Libre',serif;font-weight:700;font-size:16px;color:var(--text)">יום ${day.dayNum}</span>
        <span style="font-size:13px;color:var(--brand);font-weight:600">${escapeHtml(day.dayLabel)}</span>
        <span class="muted" style="font-size:11px">${day.date}</span>
        ${today?'<span class="tag" style="background:var(--green)">היום</span>':''}${badge}
        <span class="sum-chevron">▼</span>
      </summary>
      <div class="meal-slots-wrap">${slots}</div>
    </details>`;
  }).join('');

  const allCats=['all','pareve','dairy','produce','cleaning','other'];
  const catLabels={all:'הכל',...MEAL_CAT_LABELS};
  const curCat=cache.mealShopCat||'all';
  const catBar=allCats.map(c=>`<button class="shop-cat-tab${c===curCat?' active':''}" onclick="filterShopCat('${c}')">${catLabels[c]}</button>`).join('');
  const filtered=curCat==='all' ? shopping : shopping.filter(x=>x.category===curCat);
  const doneCount=shopping.filter(x=>x.done).length;
  const hasDone=doneCount>0;
  const shopRows=filtered.length ? filtered.map(item=>{
    const col=MEAL_CAT_COLORS[item.category]||'#aaa';
    const lbl=MEAL_CAT_LABELS[item.category]||item.category;
    return `<div class="checkrow${item.done?' done':''}">
      <input type="checkbox"${item.done?' checked':''} onchange="toggleShoppingItem('${item.id}',this.checked)">
      <span class="txt">${escapeHtml(item.text)}</span>
      <span class="tag" style="background:${col}">${lbl}</span>
      ${item.addedBy?`<span class="muted" style="font-size:10.5px;margin-inline-start:4px">${escapeHtml(item.addedBy)}</span>`:''}
      <button class="btn-del" aria-label="מחיקה" onclick="delShoppingItem('${item.id}')">✕</button>
    </div>`;
  }).join('') : `<div class="empty-hint">אין פריטים בקטגוריה זו</div>`;

  return `
    <div class="section-title">🍳 רוטציית מטבח</div>
    <div class="warn-box" style="margin-bottom:14px">כולם יכולים לערוך — סמנו משפחות אחראיות וציינו מה מכינים. נשמר אוטומטית.</div>
    ${dayCards}
    <div class="section-title" style="margin-top:14px">🛒 רשימת קניות</div>
    <div class="card" style="margin-bottom:10px">
      <div class="row"><input type="text" id="shop-text" placeholder="פריט לקנות..." onkeydown="if(event.key==='Enter')addShoppingItem()"></div>
      <div class="row">
        <select id="shop-cat">${['pareve','dairy','produce','cleaning','other'].map(c=>`<option value="${c}">${MEAL_CAT_LABELS[c]}</option>`).join('')}</select>
        <select id="shop-adder"><option value="">מי מוסיף?</option>${FAMILIES.map(f=>`<option>${escapeHtml(f)}</option>`).join('')}</select>
        <button class="btn btn-add" onclick="addShoppingItem()">+</button>
      </div>
    </div>
    ${shopping.length?progressHtml(doneCount,shopping.length):''}
    <div class="shop-cat-bar">${catBar}</div>
    <div class="card" id="shop-items-list">${shopRows}</div>
    ${hasDone?`<button class="small-btn" style="margin-top:6px" onclick="clearDoneShopping()">🗑️ מחיקת פריטים שנרכשו</button>`:''}
  `;
}
async function toggleMealFamily(dayId, slot, family, checked){
  const days=await loadKey('meal-rota',[]);
  const day=days.find(d=>d.id===dayId); if(!day) return;
  const meal=day.meals.find(m=>m.slot===slot); if(!meal) return;
  if(!meal.families) meal.families=[];
  if(checked){ if(!meal.families.includes(family)) meal.families.push(family); }
  else { meal.families=meal.families.filter(f=>f!==family); }
  await saveKey('meal-rota', days);
}
async function saveMealField(dayId, slot, field, value){
  const days=await loadKey('meal-rota',[]);
  const day=days.find(d=>d.id===dayId); if(!day) return;
  const meal=day.meals.find(m=>m.slot===slot); if(!meal) return;
  meal[field]=value;
  await saveKey('meal-rota', days);
}
async function addShoppingItem(){
  const text=el('shop-text').value.trim(); if(!text) return;
  const category=el('shop-cat').value, addedBy=el('shop-adder').value;
  const shopping=await loadKey('shopping-list',[]);
  shopping.push({id:uid(), text, category, done:false, addedBy});
  await saveKey('shopping-list', shopping);
  await RENDERERS['meal-rota']();
}
async function toggleShoppingItem(id, checked){
  const shopping=await loadKey('shopping-list',[]);
  const item=shopping.find(x=>x.id===id); if(item) item.done=checked;
  await saveKey('shopping-list', shopping);
  await RENDERERS['meal-rota']();
}
async function delShoppingItem(id){
  let shopping=await loadKey('shopping-list',[]);
  shopping=shopping.filter(x=>x.id!==id);
  await saveKey('shopping-list', shopping);
  await RENDERERS['meal-rota']();
}
async function clearDoneShopping(){
  if(!(await confirmModal('למחוק את כל הפריטים שנרכשו?'))) return;
  let shopping=await loadKey('shopping-list',[]);
  shopping=shopping.filter(x=>!x.done);
  await saveKey('shopping-list', shopping);
  await RENDERERS['meal-rota']();
}
async function filterShopCat(cat){ cache.mealShopCat=cat; await RENDERERS['meal-rota'](); }
